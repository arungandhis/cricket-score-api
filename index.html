<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cricket Live Studio | Match Simulator with Audio & Video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .commentary-text { font-family: 'JetBrains Mono', monospace; }
    canvas { box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border-radius: 1rem; background: #0a1f1e; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-gray-100">
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    // --------------------------------------------------------------
    // Parser for Cricsheet JSON (the format of your 335982.json)
    // --------------------------------------------------------------
    const parseCricsheetJSON = (json) => {
      if (!json.info || !json.innings || !Array.isArray(json.innings) || json.innings.length === 0) {
        throw new Error("Invalid Cricsheet format: missing 'info' or 'innings' array");
      }

      // Extract match info
      const matchInfo = {
        teams: json.info.teams?.join(" vs ") || "Team A vs Team B",
        venue: json.info.venue || "Unknown Venue",
        date: json.info.dates?.[0] || "Unknown Date",
        winner: json.info.outcome?.winner || "N/A"
      };

      // We'll only simulate the first innings (the batting team's innings)
      // The user can upload any match – we'll use the first innings' deliveries.
      const firstInnings = json.innings[0];
      const battingTeam = firstInnings.team;
      const deliveriesFlat = [];

      for (const overObj of firstInnings.overs) {
        const overNum = overObj.over;
        for (const delivery of overObj.deliveries) {
          const runs = delivery.runs?.total ?? 0;
          const isWicket = delivery.wickets && delivery.wickets.length > 0;
          let wicketKind = null;
          let wicketPlayer = null;
          if (isWicket) {
            const w = delivery.wickets[0];
            wicketKind = w.kind;
            wicketPlayer = w.player_out;
          }

          // Generate a lively commentary from runs, extras, wicket
          let commentary = "";
          const extras = delivery.runs?.extras ?? 0;
          if (isWicket) {
            commentary = `${wicketPlayer} is out! ${wicketKind}${wicketKind === "run out" ? "!" : ""} Brilliant fielding!`;
          } else if (extras > 0) {
            if (delivery.extras?.wides) commentary = `Wide! ${extras} run(s) added.`;
            else if (delivery.extras?.byes) commentary = `Byes! ${extras} runs.`;
            else if (delivery.extras?.legbyes) commentary = `Leg‑byes! ${extras} runs.`;
            else commentary = `${extras} extras.`;
          } else {
            if (runs === 0) commentary = "Dot ball! Good bowling.";
            else if (runs === 1) commentary = "Quick single! Good running.";
            else if (runs === 2) commentary = "Two runs, well placed.";
            else if (runs === 4) commentary = "FOUR! Hammered to the boundary!";
            else if (runs === 6) commentary = "SIX! High and handsome!";
            else commentary = `${runs} runs taken.`;
          }

          deliveriesFlat.push({
            over: overNum,
            ball: delivery.ball || (deliveriesFlat.length % 6 + 1), // approximate ball number
            runs: runs,
            wicket: isWicket,
            wicketKind: wicketKind,
            commentary: commentary,
            striker: delivery.batter,
            nonStriker: delivery.non_striker,
            bowler: delivery.bowler
          });
        }
      }

      return { matchInfo, deliveries: deliveriesFlat, battingTeam };
    };

    // Helper to compute match state up to a ball index
    const computeStateUpTo = (deliveries, maxIndex) => {
      let totalRuns = 0, wickets = 0, ballsCount = 0;
      for (let i = 0; i <= maxIndex; i++) {
        const d = deliveries[i];
        totalRuns += d.runs;
        if (d.wicket) wickets++;
        ballsCount++;
      }
      const oversDecimal = Math.floor(ballsCount / 6) + (ballsCount % 6) / 10;
      return { totalRuns, wickets, ballsCount, overs: oversDecimal.toFixed(1) };
    };

    // Main App Component
    const App = () => {
      const [matchData, setMatchData] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [fileName, setFileName] = React.useState("");

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const json = JSON.parse(e.target.result);
            const parsed = parseCricsheetJSON(json);
            setMatchData(parsed);
            setError(null);
          } catch (err) {
            setError(err.message);
            setMatchData(null);
          }
        };
        reader.readAsText(file);
      };

      const resetToUpload = () => {
        setMatchData(null);
        setError(null);
        setFileName("");
      };

      return (
        <div className="max-w-7xl mx-auto px-4 py-6 md:py-10">
          <header className="text-center mb-8">
            <h1 className="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-teal-300 to-emerald-400 bg-clip-text text-transparent">
              🏏 CRIC·LIVE STUDIO
            </h1>
            <p className="text-gray-300 mt-2 text-sm md:text-base">
              Upload a Cricsheet JSON → Live Board + Audio Commentary + Video Export (YouTube ready)
            </p>
          </header>

          {!matchData ? (
            <div className="max-w-2xl mx-auto bg-gray-800/60 backdrop-blur-sm rounded-2xl p-8 border border-gray-700 shadow-2xl">
              <div className="flex flex-col items-center justify-center gap-6">
                <label className="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-teal-500/50 rounded-xl cursor-pointer bg-gray-900/40 hover:bg-gray-800/60 transition">
                  <div className="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg className="w-10 h-10 mb-3 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p className="mb-2 text-sm text-gray-300"><span className="font-semibold">Click to upload</span> Cricsheet JSON</p>
                    <p className="text-xs text-gray-400">Your 335982.json is fully compatible!</p>
                  </div>
                  <input type="file" accept=".json" className="hidden" onChange={handleFileUpload} />
                </label>
                {error && <div className="bg-red-900/50 border border-red-500 rounded-lg p-3 w-full text-red-200 text-sm">⚠️ {error}</div>}
              </div>
            </div>
          ) : (
            <MatchSimulator matchData={matchData} onReset={resetToUpload} />
          )}
        </div>
      );
    };

    // Simulator Component (live board, audio, video)
    const MatchSimulator = ({ matchData, onReset }) => {
      const { deliveries, matchInfo, battingTeam } = matchData;
      const totalBalls = deliveries.length;

      const [currentBallIdx, setCurrentBallIdx] = React.useState(-1);
      const [isPlaying, setIsPlaying] = React.useState(false);
      const [speed, setSpeed] = React.useState(1);
      const [muteAudio, setMuteAudio] = React.useState(false);
      const [commentaryLog, setCommentaryLog] = React.useState([]);

      const canvasRef = React.useRef(null);
      const mediaRecorderRef = React.useRef(null);
      const recordedChunksRef = React.useRef([]);
      const [isRecording, setIsRecording] = React.useState(false);
      const [videoBlobUrl, setVideoBlobUrl] = React.useState(null);

      const matchState = React.useMemo(() => {
        if (currentBallIdx < 0) return { totalRuns: 0, wickets: 0, ballsCount: 0, overs: "0.0" };
        return computeStateUpTo(deliveries, currentBallIdx);
      }, [currentBallIdx, deliveries]);

      const currentDelivery = currentBallIdx >= 0 && currentBallIdx < totalBalls ? deliveries[currentBallIdx] : null;

      const addCommentaryEntry = (delivery, idx) => {
        const ballDesc = `Over ${delivery.over}.${delivery.ball} • ${delivery.striker} • ${delivery.bowler} → ${delivery.commentary}${delivery.wicket ? ' 🚨 WICKET!' : ''}`;
        setCommentaryLog(prev => [{ id: idx, text: ballDesc, timestamp: new Date().toLocaleTimeString(), isWicket: delivery.wicket || false }, ...prev].slice(0, 50));
      };

      const speakCommentary = (text) => {
        if (muteAudio || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
      };

      const playNextBall = React.useCallback(() => {
        if (currentBallIdx + 1 >= totalBalls) {
          setIsPlaying(false);
          if (!muteAudio) {
            const finalUtter = new SpeechSynthesisUtterance(`Match completed! Final score ${matchState.totalRuns} for ${matchState.wickets} wickets.`);
            window.speechSynthesis.speak(finalUtter);
          }
          return;
        }
        const nextIdx = currentBallIdx + 1;
        const nextDelivery = deliveries[nextIdx];
        setCurrentBallIdx(nextIdx);
        addCommentaryEntry(nextDelivery, nextIdx);
        speakCommentary(`${nextDelivery.striker} facing ${nextDelivery.bowler}. ${nextDelivery.commentary}`);
      }, [currentBallIdx, deliveries, totalBalls, matchState.totalRuns, matchState.wickets, muteAudio]);

      React.useEffect(() => {
        if (!isPlaying) return;
        const intervalTime = 1800 / speed;
        const timer = setInterval(playNextBall, intervalTime);
        return () => clearInterval(timer);
      }, [isPlaying, playNextBall, speed]);

      const resetSimulation = () => {
        setIsPlaying(false);
        setCurrentBallIdx(-1);
        setCommentaryLog([]);
        setVideoBlobUrl(null);
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const startMatch = () => {
        if (currentBallIdx === -1) {
          setCurrentBallIdx(0);
          addCommentaryEntry(deliveries[0], 0);
          speakCommentary(`${deliveries[0].striker} facing ${deliveries[0].bowler}. ${deliveries[0].commentary}`);
        }
        setIsPlaying(true);
      };

      const pauseMatch = () => setIsPlaying(false);

      // Canvas drawing for video commentary
      const drawCanvas = React.useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;

        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#0b2b26');
        grad.addColorStop(1, '#051a17');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#2dd4bf';
        ctx.lineWidth = 3;
        ctx.strokeRect(5, 5, w-10, h-10);

        // Match header
        ctx.font = 'bold 28px "Inter", sans-serif';
        ctx.fillStyle = '#f0fdf4';
        ctx.fillText(matchInfo.teams, 30, 55);
        ctx.font = '14px monospace';
        ctx.fillStyle = '#a3e9d6';
        ctx.fillText(`${matchInfo.venue} • ${matchInfo.date}`, 30, 85);

        // Scorecard
        ctx.fillStyle = '#000000aa';
        ctx.fillRect(30, 110, w-60, 80);
        ctx.font = 'bold 42px monospace';
        ctx.fillStyle = '#facc15';
        ctx.fillText(`${matchState.totalRuns}/${matchState.wickets}`, 50, 170);
        ctx.font = '24px monospace';
        ctx.fillStyle = '#cbd5e1';
        ctx.fillText(`(${matchState.overs} overs)`, 260, 165);

        if (currentDelivery) {
          ctx.font = 'bold 18px "Inter"';
          ctx.fillStyle = '#d9f99d';
          ctx.fillText(`🏏 STRIKER: ${currentDelivery.striker}`, 50, 215);
          ctx.fillStyle = '#c4f0e6';
          ctx.fillText(`🔄 NON-STRIKER: ${currentDelivery.nonStriker}`, 50, 245);
          ctx.fillStyle = '#fde047';
          ctx.fillText(`⚡ BOWLER: ${currentDelivery.bowler}`, 50, 275);
        } else {
          ctx.fillStyle = '#aaa';
          ctx.fillText("⚡ Awaiting start...", 50, 240);
        }

        const lastComment = commentaryLog[0]?.text || "No commentary yet";
        ctx.fillStyle = '#1e2a2acc';
        ctx.fillRect(30, h-130, w-60, 90);
        ctx.font = 'italic 16px "JetBrains Mono"';
        ctx.fillStyle = '#e2e8f0';
        ctx.fillText("🎙️ LATEST BALL:", 40, h-100);
        ctx.font = '14px "JetBrains Mono"';
        ctx.fillStyle = '#f1f5f9';
        const wrapped = lastComment.length > 70 ? lastComment.slice(0,70)+"..." : lastComment;
        ctx.fillText(wrapped, 40, h-70);

        ctx.font = '10px monospace';
        ctx.fillStyle = '#4b5563';
        ctx.fillText("CRIC·LIVE STUDIO | VIDEO COMMENTARY", w-200, h-15);
      }, [matchState, currentDelivery, commentaryLog, matchInfo]);

      React.useEffect(() => { drawCanvas(); }, [drawCanvas]);

      const startRecording = () => {
        if (!canvasRef.current) return;
        const stream = canvasRef.current.captureStream(30);
        recordedChunksRef.current = [];
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunksRef.current.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunksRef.current, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          setVideoBlobUrl(url);
          setIsRecording(false);
        };
        mediaRecorder.start();
        mediaRecorderRef.current = mediaRecorder;
        setIsRecording(true);
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) mediaRecorderRef.current.stop();
      };

      const downloadVideo = () => {
        if (videoBlobUrl) {
          const a = document.createElement('a');
          a.href = videoBlobUrl;
          a.download = `cricket-highlights-${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } else {
          alert("No recorded video. Click 'Start Recording' and simulate the match.");
        }
      };

      const progressPercent = currentBallIdx >= 0 ? ((currentBallIdx+1)/totalBalls)*100 : 0;

      return (
        <div className="space-y-6">
          <div className="flex flex-wrap justify-between items-center gap-3 bg-gray-800/50 p-4 rounded-2xl backdrop-blur-sm">
            <div>
              <h2 className="text-2xl font-bold">{matchInfo.teams}</h2>
              <p className="text-sm text-gray-300">{matchInfo.venue} • {matchInfo.date}</p>
            </div>
            <button onClick={onReset} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-xl text-sm transition">🔄 Upload New JSON</button>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-4">
              <div className="bg-black/40 rounded-2xl p-5 border border-teal-500/30">
                <div className="flex justify-between items-center flex-wrap">
                  <div>
                    <span className="text-4xl font-black text-teal-300">{matchState.totalRuns}</span>
                    <span className="text-2xl font-bold text-gray-300">/{matchState.wickets}</span>
                    <div className="text-gray-400 text-sm mt-1">Overs: {matchState.overs} ({matchState.ballsCount} balls)</div>
                  </div>
                  <div className="bg-teal-900/50 px-4 py-2 rounded-xl text-right">
                    <div className="text-xs text-teal-300">REQUIRED / CRR</div>
                    <div className="text-sm font-mono">— Simulating —</div>
                  </div>
                </div>
                <div className="w-full bg-gray-700 h-2 rounded-full mt-4">
                  <div className="bg-teal-400 h-2 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
                </div>
                <div className="grid grid-cols-2 gap-4 mt-5 text-sm">
                  {currentDelivery && (
                    <>
                      <div><span className="text-gray-400">Striker:</span> <span className="font-bold text-yellow-200">{currentDelivery.striker}</span></div>
                      <div><span className="text-gray-400">Non-striker:</span> <span className="font-bold text-yellow-200">{currentDelivery.nonStriker}</span></div>
                      <div><span className="text-gray-400">Bowler:</span> <span className="font-bold text-emerald-300">{currentDelivery.bowler}</span></div>
                      <div><span className="text-gray-400">Last Ball:</span> <span className="font-mono">{currentDelivery.runs} runs {currentDelivery.wicket ? '❌ Wicket' : ''}</span></div>
                    </>
                  )}
                </div>
              </div>

              <div className="flex flex-wrap gap-3 items-center bg-gray-800/40 p-3 rounded-xl">
                {!isPlaying ? (
                  <button onClick={startMatch} disabled={currentBallIdx+1 >= totalBalls} className="bg-green-700 hover:bg-green-600 disabled:opacity-50 px-5 py-2 rounded-full font-semibold">▶ START / RESUME</button>
                ) : (
                  <button onClick={pauseMatch} className="bg-yellow-700 hover:bg-yellow-600 px-5 py-2 rounded-full font-semibold">⏸ PAUSE</button>
                )}
                <button onClick={playNextBall} disabled={isPlaying || currentBallIdx+1 >= totalBalls} className="bg-blue-800 hover:bg-blue-700 disabled:opacity-40 px-4 py-2 rounded-full text-sm">⏩ Next Ball</button>
                <button onClick={resetSimulation} className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-full text-sm">🔄 Reset</button>
                <div className="flex items-center gap-2 ml-auto">
                  <span className="text-xs">Speed:</span>
                  {[1,2,4].map(sp => (
                    <button key={sp} onClick={() => setSpeed(sp)} className={`px-3 py-1 rounded-md text-xs ${speed === sp ? 'bg-teal-600' : 'bg-gray-700'}`}>{sp}x</button>
                  ))}
                </div>
                <button onClick={() => setMuteAudio(!muteAudio)} className={`px-3 py-1 rounded-md text-xs ${muteAudio ? 'bg-red-700' : 'bg-teal-700'}`}>
                  {muteAudio ? '🔇 Audio Off' : '🔊 Audio On'}
                </button>
              </div>

              <div className="bg-gray-900/70 rounded-xl p-4 h-64 overflow-y-auto border border-gray-700">
                <h3 className="font-bold text-teal-300 mb-2">🎙️ LIVE COMMENTARY</h3>
                {commentaryLog.length === 0 && <p className="text-gray-500 text-sm italic">No commentary yet.</p>}
                <div className="space-y-2">
                  {commentaryLog.map(c => (
                    <div key={c.id} className={`p-2 rounded-md text-sm ${c.isWicket ? 'bg-red-900/30 border-l-4 border-red-500' : 'bg-gray-800/50'}`}>
                      <span className="text-gray-400 text-[11px] mr-2">{c.timestamp}</span>
                      <span className="commentary-text text-gray-200">{c.text}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="bg-gray-800/40 rounded-2xl p-4 backdrop-blur-sm">
              <h3 className="text-lg font-semibold text-teal-300 mb-3">📹 VIDEO COMMENTARY (Broadcast)</h3>
              <canvas ref={canvasRef} width={550} height={360} className="w-full h-auto rounded-xl border border-teal-500/40" style={{ aspectRatio: '550/360' }}></canvas>
              <div className="flex flex-wrap gap-2 mt-4">
                {!isRecording ? (
                  <button onClick={startRecording} disabled={isPlaying === false && currentBallIdx === -1} className="bg-red-700 hover:bg-red-600 disabled:opacity-50 text-sm px-3 py-1.5 rounded-full">🔴 Start Recording</button>
                ) : (
                  <button onClick={stopRecording} className="bg-gray-600 hover:bg-gray-500 text-sm px-3 py-1.5 rounded-full">⏹️ Stop & Save</button>
                )}
                <button onClick={downloadVideo} disabled={!videoBlobUrl} className="bg-purple-700 hover:bg-purple-600 disabled:opacity-50 text-sm px-3 py-1.5 rounded-full">📥 Download Video</button>
              </div>
              {videoBlobUrl && <div className="mt-3 text-xs text-center text-green-300 bg-gray-900/60 p-2 rounded-lg">✅ Video ready! Download and upload to YouTube.</div>}
              <p className="text-[11px] text-gray-400 mt-3 text-center">Recording captures the live canvas. After download, upload manually to YouTube.</p>
            </div>
          </div>

          {currentBallIdx+1 >= totalBalls && currentBallIdx !== -1 && (
            <div className="bg-gradient-to-r from-amber-800 to-orange-800 p-4 rounded-xl text-center animate-pulse">
              🏆 MATCH FINISHED! Final Score: {matchState.totalRuns}/{matchState.wickets} in {matchState.overs} overs 🏆
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
