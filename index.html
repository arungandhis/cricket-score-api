<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cricket Live Studio – Full Scoreboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .commentary-text { font-family: 'JetBrains Mono', monospace; }
    canvas { box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border-radius: 1rem; background: #0a1f1e; }
    .error-bar { background: #ff4444; color: white; padding: 12px; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; z-index: 1000; font-size: 14px; }
    .stats-table { overflow-x: auto; max-width: 100%; }
    .stats-table table { min-width: 500px; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-gray-100">
  <div id="root">Loading application...</div>
  <div id="error-message" style="display: none;"></div>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      var errDiv = document.getElementById('error-message');
      errDiv.style.display = 'block';
      errDiv.className = 'error-bar';
      errDiv.innerHTML = '⚠️ ' + (error ? error.message : msg);
      return true;
    };
    setTimeout(function() {
      if (typeof React === 'undefined') {
        var errDiv = document.getElementById('error-message');
        errDiv.style.display = 'block';
        errDiv.className = 'error-bar';
        errDiv.innerHTML = '⚠️ React failed to load. Check your internet connection.';
      }
    }, 3000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    // --------------------------------------------------------------
    // Enhanced realistic commentary with emotion (unchanged)
    // --------------------------------------------------------------
    const generateRealisticCommentary = (delivery, inningsIdx, target, isWinningRun = false) => {
      const runs = delivery.runs;
      const isWicket = delivery.wicket;
      const wicketKind = delivery.wicketKind;
      const striker = delivery.striker;
      const bowler = delivery.bowler;
      const extras = delivery.extras || 0;

      const boundaryPhrases = [
        "Cracked away to the boundary!",
        "That's a glorious shot!",
        "Pure timing!",
        "Races away to the rope!",
        "He's dispatched that one!"
      ];
      const sixPhrases = [
        "High and handsome! Six runs!",
        "Out of the park! What a hit!",
        "That's massive!",
        "Into the crowd!",
        "He's launched it!"
      ];
      const wicketPhrases = {
        caught: "Caught! The fielder makes no mistake!",
        bowled: "Bowled him! Timber!",
        lbw: "Plumb in front! That's out!",
        "run out": "Run out! Direct hit!",
        stumped: "Stumped! The keeper whips the bails off!"
      };

      if (isWicket) {
        let phrase = wicketPhrases[wicketKind] || "Wicket! The batsman has to go!";
        return `${striker} is out! ${phrase}`;
      }
      if (extras > 0) {
        if (delivery.extrasObj && delivery.extrasObj.wides) return `Wide! ${extras} run added. ${bowler} needs to get his line right.`;
        if (delivery.extrasObj && delivery.extrasObj.byes) return `Byes! ${extras} runs. The keeper missed it.`;
        if (delivery.extrasObj && delivery.extrasObj.legbyes) return `Leg‑byes! ${extras} runs.`;
        return `${extras} extras.`;
      }
      if (runs === 0) {
        const dotPhrases = ["Dot ball! Good bowling.", "No run. Excellent fielding.", "Beaten! That's a beauty."];
        return dotPhrases[Math.floor(Math.random() * dotPhrases.length)];
      }
      if (runs === 1) return "Quick single! They scamper through.";
      if (runs === 2) return "Two runs. Good running between the wickets.";
      if (runs === 4) {
        let phrase = boundaryPhrases[Math.floor(Math.random() * boundaryPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 4)) phrase += " The scores are level!";
        return phrase;
      }
      if (runs === 6) {
        let phrase = sixPhrases[Math.floor(Math.random() * sixPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 6)) phrase += " Just one big hit away!";
        return phrase;
      }
      return `${runs} runs taken.`;
    };

    // Voice selection
    let selectedVoice = null;
    const getBestVoice = () => {
      return new Promise((resolve) => {
        const synth = window.speechSynthesis;
        const loadVoices = () => {
          const voices = synth.getVoices();
          let best = voices.find(v => v.lang === 'en-IN' && v.name.includes('Rishi')) ||
                     voices.find(v => v.lang === 'en-IN') ||
                     voices.find(v => v.lang === 'en-GB' && v.name.includes('Samantha')) ||
                     voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha')) ||
                     voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) ||
                     voices.find(v => v.lang.startsWith('en'));
          resolve(best || null);
        };
        if (synth.getVoices().length) loadVoices();
        else synth.addEventListener('voiceschanged', loadVoices);
      });
    };

    let currentUtterance = null;
    const speakWithCallback = async (text, excitementLevel, onEnd) => {
      if (!window.speechSynthesis) {
        if (onEnd) onEnd();
        return;
      }
      if (currentUtterance) {
        try { window.speechSynthesis.cancel(); } catch(e) {}
        currentUtterance = null;
      }
      if (!selectedVoice) {
        selectedVoice = await getBestVoice();
      }
      const utterance = new SpeechSynthesisUtterance(text);
      if (selectedVoice) utterance.voice = selectedVoice;
      if (excitementLevel === 2) {
        utterance.rate = 1.1;
        utterance.pitch = 1.2;
      } else if (excitementLevel === 1) {
        utterance.rate = 1.0;
        utterance.pitch = 1.05;
      } else {
        utterance.rate = 0.9;
        utterance.pitch = 0.95;
      }
      utterance.volume = 1;
      utterance.onend = () => {
        currentUtterance = null;
        if (onEnd) onEnd();
      };
      utterance.onerror = () => {
        currentUtterance = null;
        if (onEnd) onEnd();
      };
      currentUtterance = utterance;
      try {
        window.speechSynthesis.speak(utterance);
      } catch(e) {
        if (onEnd) onEnd();
      }
    };

    // Parser with full stats accumulation
    const parseCricsheetJSON = (json) => {
      if (!json.info || !json.innings || !Array.isArray(json.innings) || json.innings.length < 2) {
        throw new Error("Invalid Cricsheet format: need two innings");
      }
      const matchInfo = {
        teams: (json.info.teams && json.info.teams.join(" vs ")) || "Team A vs Team B",
        venue: json.info.venue || "Unknown Venue",
        date: (json.info.dates && json.info.dates[0]) || "Unknown Date",
        winner: (json.info.outcome && json.info.outcome.winner) || "N/A",
        toss: json.info.toss ? `${json.info.toss.winner} won the toss and chose to ${json.info.toss.decision}` : "No toss info"
      };
      const inningsData = [];
      for (let innIdx = 0; innIdx < json.innings.length; innIdx++) {
        const inn = json.innings[innIdx];
        const team = inn.team;
        const deliveriesFlat = [];
        // Batting stats per batter
        const battingStats = {};
        // Bowling stats per bowler
        const bowlingStats = {};

        for (var i = 0; i < inn.overs.length; i++) {
          var overObj = inn.overs[i];
          var overNum = overObj.over;
          for (var j = 0; j < overObj.deliveries.length; j++) {
            var delivery = overObj.deliveries[j];
            var runs = (delivery.runs && delivery.runs.total) || 0;
            var isWicket = !!(delivery.wickets && delivery.wickets.length);
            var wicketKind = null;
            var wicketPlayer = null;
            var extras = (delivery.runs && delivery.runs.extras) || 0;
            var extrasObj = {};
            if (delivery.extras) {
              if (delivery.extras.wides) extrasObj.wides = delivery.extras.wides;
              if (delivery.extras.byes) extrasObj.byes = delivery.extras.byes;
              if (delivery.extras.legbyes) extrasObj.legbyes = delivery.extras.legbyes;
            }
            if (isWicket) {
              var w = delivery.wickets[0];
              wicketKind = w.kind;
              wicketPlayer = w.player_out;
            }

            // Update batting stats for striker (if not a wicket where batsman is out, but still runs count)
            const striker = delivery.batter;
            if (!battingStats[striker]) {
              battingStats[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            }
            if (!isWicket || wicketPlayer !== striker) {
              // Only count balls faced if not a wicket of this batsman (wicket ball counts as a ball faced)
              battingStats[striker].balls++;
            }
            battingStats[striker].runs += runs;
            if (runs === 4) battingStats[striker].fours++;
            if (runs === 6) battingStats[striker].sixes++;

            // Update bowling stats for bowler
            const bowler = delivery.bowler;
            if (!bowlingStats[bowler]) {
              bowlingStats[bowler] = { overs: 0, runs: 0, wickets: 0, balls: 0 };
            }
            // Increment balls bowled (excluding wides, but wides don't count as balls)
            if (!extrasObj.wides) {
              bowlingStats[bowler].balls++;
            }
            bowlingStats[bowler].runs += runs;
            if (isWicket) {
              bowlingStats[bowler].wickets++;
            }

            deliveriesFlat.push({
              over: overNum,
              ball: delivery.ball || ((deliveriesFlat.length % 6) + 1),
              runs: runs,
              wicket: isWicket,
              wicketKind: wicketKind,
              wicketPlayer: wicketPlayer,
              extras: extras,
              extrasObj: extrasObj,
              striker: striker,
              nonStriker: delivery.non_striker,
              bowler: bowler
            });
          }
        }

        // Convert bowling balls to overs (6 balls per over)
        for (let bowler in bowlingStats) {
          let balls = bowlingStats[bowler].balls;
          let overs = Math.floor(balls / 6) + (balls % 6) / 10;
          bowlingStats[bowler].overs = overs.toFixed(1);
          delete bowlingStats[bowler].balls;
        }

        inningsData.push({ team, deliveries: deliveriesFlat, battingStats, bowlingStats });
      }
      // Determine target if second innings exists
      let target = null;
      if (inningsData.length === 2) {
        const firstInningsScore = inningsData[0].deliveries.reduce((sum, d) => sum + d.runs, 0);
        target = firstInningsScore + 1;
      }
      return { matchInfo, inningsData, target };
    };

    const computeStateUpTo = function(deliveries, maxIndex) {
      var totalRuns = 0, wickets = 0, ballsCount = 0;
      for (var i = 0; i <= maxIndex; i++) {
        var d = deliveries[i];
        totalRuns += d.runs;
        if (d.wicket) wickets++;
        ballsCount++;
      }
      var oversDecimal = Math.floor(ballsCount / 6) + (ballsCount % 6) / 10;
      return { totalRuns, wickets, ballsCount, overs: oversDecimal.toFixed(1) };
    };

    const App = () => {
      const [matchData, setMatchData] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [fileName, setFileName] = React.useState("");

      const handleFileUpload = (event) => {
        var file = event.target.files[0];
        if (!file) return;
        setFileName(file.name);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var json = JSON.parse(e.target.result);
            var parsed = parseCricsheetJSON(json);
            setMatchData(parsed);
            setError(null);
          } catch (err) {
            setError(err.message);
            setMatchData(null);
          }
        };
        reader.readAsText(file);
      };

      const resetToUpload = function() {
        setMatchData(null);
        setError(null);
        setFileName("");
      };

      if (!matchData) {
        return React.createElement('div', { className: "max-w-2xl mx-auto bg-gray-800/60 backdrop-blur-sm rounded-2xl p-8 border border-gray-700" },
          React.createElement('div', { className: "flex flex-col items-center justify-center gap-6" },
            React.createElement('label', { className: "flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-teal-500/50 rounded-xl cursor-pointer bg-gray-900/40 hover:bg-gray-800/60" },
              React.createElement('div', { className: "flex flex-col items-center justify-center pt-5 pb-6" },
                React.createElement('svg', { className: "w-10 h-10 mb-3 text-teal-400", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                  React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" })
                ),
                React.createElement('p', { className: "mb-2 text-sm text-gray-300" }, React.createElement('span', { className: "font-semibold" }, "Click to upload"), " Cricsheet JSON"),
                React.createElement('p', { className: "text-xs text-gray-400" }, "Full match (both innings) supported with detailed scoreboard!")
              ),
              React.createElement('input', { type: "file", accept: ".json", className: "hidden", onChange: handleFileUpload })
            ),
            error && React.createElement('div', { className: "bg-red-900/50 border border-red-500 rounded-lg p-3 w-full text-red-200 text-sm" }, "⚠️ ", error)
          )
        );
      } else {
        return React.createElement(MatchSimulator, { matchData: matchData, onReset: resetToUpload });
      }
    };

    const StatsPanel = ({ battingStats, bowlingStats, title }) => {
      // Convert batting stats object to array sorted by runs
      const battingRows = Object.entries(battingStats).map(([name, stats]) => ({
        name,
        ...stats,
        sr: stats.runs / stats.balls * 100 || 0
      })).sort((a,b) => b.runs - a.runs);

      const bowlingRows = Object.entries(bowlingStats).map(([name, stats]) => ({
        name,
        ...stats,
        economy: stats.runs / (parseFloat(stats.overs) || 1)
      })).sort((a,b) => a.runs - b.runs);

      return React.createElement('div', { className: "mt-4 p-3 bg-gray-800/30 rounded-xl" },
        React.createElement('h4', { className: "text-teal-300 font-bold mb-2" }, title),
        React.createElement('div', { className: "stats-table overflow-x-auto" },
          React.createElement('table', { className: "min-w-full text-xs text-left text-gray-300" },
            React.createElement('thead', { className: "text-gray-400 border-b border-gray-700" },
              React.createElement('tr', null,
                React.createElement('th', { className: "py-1 px-2" }, "Batsman"),
                React.createElement('th', { className: "py-1 px-2" }, "R"),
                React.createElement('th', { className: "py-1 px-2" }, "B"),
                React.createElement('th', { className: "py-1 px-2" }, "4s"),
                React.createElement('th', { className: "py-1 px-2" }, "6s"),
                React.createElement('th', { className: "py-1 px-2" }, "SR")
              )
            ),
            React.createElement('tbody', null,
              battingRows.map(row => React.createElement('tr', { key: row.name, className: "border-b border-gray-800" },
                React.createElement('td', { className: "py-1 px-2 font-mono" }, row.name),
                React.createElement('td', { className: "py-1 px-2" }, row.runs),
                React.createElement('td', { className: "py-1 px-2" }, row.balls),
                React.createElement('td', { className: "py-1 px-2" }, row.fours),
                React.createElement('td', { className: "py-1 px-2" }, row.sixes),
                React.createElement('td', { className: "py-1 px-2" }, row.sr.toFixed(1))
              ))
            )
          )
        ),
        React.createElement('div', { className: "mt-3 stats-table overflow-x-auto" },
          React.createElement('table', { className: "min-w-full text-xs text-left text-gray-300" },
            React.createElement('thead', { className: "text-gray-400 border-b border-gray-700" },
              React.createElement('tr', null,
                React.createElement('th', { className: "py-1 px-2" }, "Bowler"),
                React.createElement('th', { className: "py-1 px-2" }, "O"),
                React.createElement('th', { className: "py-1 px-2" }, "R"),
                React.createElement('th', { className: "py-1 px-2" }, "W"),
                React.createElement('th', { className: "py-1 px-2" }, "Econ")
              )
            ),
            React.createElement('tbody', null,
              bowlingRows.map(row => React.createElement('tr', { key: row.name, className: "border-b border-gray-800" },
                React.createElement('td', { className: "py-1 px-2 font-mono" }, row.name),
                React.createElement('td', { className: "py-1 px-2" }, row.overs),
                React.createElement('td', { className: "py-1 px-2" }, row.runs),
                React.createElement('td', { className: "py-1 px-2" }, row.wickets),
                React.createElement('td', { className: "py-1 px-2" }, (row.runs / (parseFloat(row.overs) || 1)).toFixed(2))
              ))
            )
          )
        )
      );
    };

    const MatchSimulator = function(props) {
      const { inningsData, matchInfo, target: initialTarget } = props.matchData;
      const [currentInningsIdx, setCurrentInningsIdx] = React.useState(0);
      const [currentBallIdx, setCurrentBallIdx] = React.useState(-1);
      const [isPlaying, setIsPlaying] = React.useState(false);
      const [speed, setSpeed] = React.useState(1);
      const [muteAudio, setMuteAudio] = React.useState(false);
      const [commentaryLog, setCommentaryLog] = React.useState([]);
      const [isSpeaking, setIsSpeaking] = React.useState(false);
      const [target, setTarget] = React.useState(initialTarget);
      const [firstInningsStats, setFirstInningsStats] = React.useState(null); // Store first innings batting/bowling after it ends

      var canvasRef = React.useRef(null);
      var mediaRecorderRef = React.useRef(null);
      var recordedChunksRef = React.useRef([]);
      var [isRecording, setIsRecording] = React.useState(false);
      var [videoBlobUrl, setVideoBlobUrl] = React.useState(null);

      const currentInnings = inningsData[currentInningsIdx];
      const deliveries = currentInnings.deliveries;
      const totalBalls = deliveries.length;

      const matchState = React.useMemo(function() {
        if (currentBallIdx < 0) return { totalRuns: 0, wickets: 0, ballsCount: 0, overs: "0.0" };
        const state = computeStateUpTo(deliveries, currentBallIdx);
        return { ...state, target: currentInningsIdx === 1 ? target : null };
      }, [currentBallIdx, deliveries, currentInningsIdx, target]);

      const currentDelivery = (currentBallIdx >= 0 && currentBallIdx < totalBalls) ? deliveries[currentBallIdx] : null;

      // When second innings starts, set target and maybe show first innings stats
      React.useEffect(() => {
        if (currentInningsIdx === 1 && firstInningsStats === null) {
          const firstInnings = inningsData[0];
          const firstTotal = firstInnings.deliveries.reduce((sum, d) => sum + d.runs, 0);
          const firstWickets = firstInnings.deliveries.filter(d => d.wicket).length;
          setTarget(firstTotal + 1);
          // Store stats for display
          setFirstInningsStats({
            team: firstInnings.team,
            battingStats: firstInnings.battingStats,
            bowlingStats: firstInnings.bowlingStats,
            total: firstTotal,
            wickets: firstWickets
          });
        }
      }, [currentInningsIdx, inningsData, firstInningsStats]);

      const addCommentaryEntry = function(delivery, idx) {
        const commentaryText = generateRealisticCommentary(delivery, currentInningsIdx, target, false);
        const ballDesc = `Innings ${currentInningsIdx+1} • Over ${delivery.over}.${delivery.ball} • ${delivery.striker} • ${delivery.bowler} → ${commentaryText}${delivery.wicket ? " 🚨 WICKET!" : ""}`;
        setCommentaryLog(function(prev) {
          var newEntry = { id: idx, text: ballDesc, timestamp: new Date().toLocaleTimeString(), isWicket: delivery.wicket || false };
          return [newEntry].concat(prev).slice(0, 50);
        });
        return commentaryText;
      };

      const advanceToNextBall = React.useCallback(function() {
        if (currentBallIdx + 1 >= totalBalls) {
          // End of this innings
          if (currentInningsIdx === 0) {
            // First innings finished, move to second innings
            setIsPlaying(false);
            const firstTotal = matchState.totalRuns;
            const firstWickets = matchState.wickets;
            setFirstInningsStats({
              team: currentInnings.team,
              battingStats: currentInnings.battingStats,
              bowlingStats: currentInnings.bowlingStats,
              total: firstTotal,
              wickets: firstWickets
            });
            setTarget(firstTotal + 1);
            // Reset for second innings
            setCurrentInningsIdx(1);
            setCurrentBallIdx(-1);
            if (!muteAudio) {
              speakWithCallback(`End of first innings. ${currentInnings.team} scored ${firstTotal} for ${firstWickets}. ${inningsData[1].team} needs ${firstTotal+1} runs to win.`, 0, function() {});
            }
          } else {
            // Match finished
            setIsPlaying(false);
            if (!muteAudio) {
              const result = matchState.totalRuns >= target ? "wins" : "loses";
              speakWithCallback(`Match finished! ${currentInnings.team} ${result} by ${Math.abs(matchState.totalRuns - target)} runs.`, 0, function() {});
            }
          }
          return;
        }
        var nextIdx = currentBallIdx + 1;
        var nextDelivery = deliveries[nextIdx];
        setCurrentBallIdx(nextIdx);
        var commentaryText = addCommentaryEntry(nextDelivery, nextIdx);
        if (!muteAudio) {
          var intro = nextDelivery.striker + " facing " + nextDelivery.bowler + ". ";
          var fullText = intro + commentaryText;
          var excitementLevel = 0;
          if (nextDelivery.runs === 4 || nextDelivery.runs === 6) excitementLevel = 1;
          if (nextDelivery.wicket) excitementLevel = 2;
          setIsSpeaking(true);
          speakWithCallback(fullText, excitementLevel, function() {
            setIsSpeaking(false);
          });
        }
      }, [currentBallIdx, deliveries, totalBalls, currentInningsIdx, matchState.totalRuns, matchState.wickets, muteAudio, target, inningsData, currentInnings]);

      var manualNextBall = function() {
        if (isSpeaking && window.speechSynthesis) {
          try { window.speechSynthesis.cancel(); } catch(e) {}
          setIsSpeaking(false);
        }
        if (currentBallIdx + 1 < totalBalls) {
          advanceToNextBall();
        }
      };

      React.useEffect(function() {
        if (!isPlaying) return;
        var intervalTime = 100 / speed;
        var timer = setInterval(function() {
          if (!isSpeaking && currentBallIdx + 1 < totalBalls) {
            advanceToNextBall();
          }
        }, intervalTime);
        return function() { clearInterval(timer); };
      }, [isPlaying, speed, isSpeaking, currentBallIdx, advanceToNextBall, totalBalls]);

      var resetSimulation = function() {
        setIsPlaying(false);
        if (isSpeaking && window.speechSynthesis) {
          try { window.speechSynthesis.cancel(); } catch(e) {}
          setIsSpeaking(false);
        }
        setCurrentInningsIdx(0);
        setCurrentBallIdx(-1);
        setCommentaryLog([]);
        setVideoBlobUrl(null);
        setFirstInningsStats(null);
        setTarget(initialTarget);
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      var startMatch = function() {
        if (currentBallIdx === -1) {
          var firstDelivery = deliveries[0];
          setCurrentBallIdx(0);
          var commentary = addCommentaryEntry(firstDelivery, 0);
          if (!muteAudio) {
            var intro = firstDelivery.striker + " facing " + firstDelivery.bowler + ". ";
            var excitementLevel = (firstDelivery.runs === 4 || firstDelivery.runs === 6) ? 1 : 0;
            setIsSpeaking(true);
            speakWithCallback(intro + commentary, excitementLevel, function() {
              setIsSpeaking(false);
            });
          }
        }
        setIsPlaying(true);
