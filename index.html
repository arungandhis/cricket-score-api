<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cricket Live Studio – Expressive Commentary & Stadium Ambience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .commentary-text { font-family: 'JetBrains Mono', monospace; }
    canvas { box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border-radius: 1rem; background: #0a1f1e; }
    .error-bar { background: #ff4444; color: white; padding: 12px; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; z-index: 1000; font-size: 14px; }
    .stats-table { overflow-x: auto; max-width: 100%; }
    .stats-table table { min-width: 500px; }
    .result-banner { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    select { background: #1f2937; color: white; border-radius: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-gray-100">
  <div id="root">Loading application...</div>
  <div id="error-message" style="display: none;"></div>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      var errDiv = document.getElementById('error-message');
      errDiv.style.display = 'block';
      errDiv.className = 'error-bar';
      errDiv.innerHTML = '⚠️ ' + (error ? error.message : msg) + (url ? ' at ' + url + ':' + line : '');
      return true;
    };
    setTimeout(function() {
      if (typeof React === 'undefined') {
        var errDiv = document.getElementById('error-message');
        errDiv.style.display = 'block';
        errDiv.className = 'error-bar';
        errDiv.innerHTML = '⚠️ React failed to load. Check your internet connection.';
      }
    }, 3000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    // --------------------------------------------------------------
    // Helper: get last name (remove initials and dots)
    // --------------------------------------------------------------
    const getLastName = (fullName) => {
      if (!fullName) return "player";
      const parts = fullName.split(/[\s.]+/);
      const lastName = parts[parts.length - 1];
      return lastName || fullName;
    };

    // Helper: get initials for avatar
    const getInitials = (fullName) => {
      if (!fullName) return "PL";
      const parts = fullName.split(/[\s.]+/);
      if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    };

    // Cache for loaded player images
    const imageCache = new Map();

    // Load image with caching
    const loadPlayerImage = (fullName) => {
      return new Promise((resolve) => {
        const initials = getInitials(fullName);
        const url = `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=random&size=80&rounded=true&bold=true&color=fff&length=2`;
        if (imageCache.has(url)) {
          resolve(imageCache.get(url));
          return;
        }
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
          imageCache.set(url, img);
          resolve(img);
        };
        img.onerror = () => {
          // Fallback: create a canvas with text
          const canvas = document.createElement('canvas');
          canvas.width = 80;
          canvas.height = 80;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#3b82f6';
          ctx.fillRect(0, 0, 80, 80);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 32px "Inter"';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(initials, 40, 40);
          imageCache.set(url, canvas);
          resolve(canvas);
        };
        img.src = url;
      });
    };

    // --------------------------------------------------------------
    // Realistic commentary generator (unchanged)
    // --------------------------------------------------------------
    const generateRealisticCommentary = (delivery, inningsIdx, target) => {
      const runs = delivery.runs;
      const isWicket = delivery.wicket;
      const wicketKind = delivery.wicketKind;
      const striker = delivery.striker;
      const bowler = delivery.bowler;
      const extras = delivery.extras || 0;

      const boundaryPhrases = [
        "Cracked away to the boundary!",
        "That's a glorious shot!",
        "Pure timing!",
        "Races away to the rope!",
        "He's dispatched that one!"
      ];
      const sixPhrases = [
        "High and handsome! Six runs!",
        "Out of the park! What a hit!",
        "That's massive!",
        "Into the crowd!",
        "He's launched it!"
      ];
      const wicketPhrases = {
        caught: "Caught! The fielder makes no mistake!",
        bowled: "Bowled him! Timber!",
        lbw: "Plumb in front! That's out!",
        "run out": "Run out! Direct hit!",
        stumped: "Stumped! The keeper whips the bails off!"
      };

      if (isWicket) {
        let phrase = wicketPhrases[wicketKind] || "Wicket! The batsman has to go!";
        return `${getLastName(striker)} is out! ${phrase}`;
      }
      if (extras > 0) {
        if (delivery.extrasObj && delivery.extrasObj.wides) return `Wide! ${extras} run added. ${getLastName(bowler)} needs to get his line right.`;
        if (delivery.extrasObj && delivery.extrasObj.byes) return `Byes! ${extras} runs. The keeper missed it.`;
        if (delivery.extrasObj && delivery.extrasObj.legbyes) return `Leg‑byes! ${extras} runs.`;
        return `${extras} extras.`;
      }
      if (runs === 0) {
        const dotPhrases = ["Dot ball! Good bowling.", "No run. Excellent fielding.", "Beaten! That's a beauty."];
        return dotPhrases[Math.floor(Math.random() * dotPhrases.length)];
      }
      if (runs === 1) return "Quick single! They scamper through.";
      if (runs === 2) return "Two runs. Good running between the wickets.";
      if (runs === 4) {
        let phrase = boundaryPhrases[Math.floor(Math.random() * boundaryPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 4)) phrase += " The scores are level!";
        return phrase;
      }
      if (runs === 6) {
        let phrase = sixPhrases[Math.floor(Math.random() * sixPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 6)) phrase += " Just one big hit away!";
        return phrase;
      }
      return `${runs} runs taken.`;
    };

    // --------------------------------------------------------------
    // Enhanced TTS with expressive styles, pauses, and pitch variation
    // --------------------------------------------------------------
    let selectedVoice = null;
    let availableVoices = [];
    let speechQueue = [];
    let isSpeaking = false;

    const loadVoices = () => {
      return new Promise((resolve) => {
        const synth = window.speechSynthesis;
        const load = () => {
          availableVoices = synth.getVoices().filter(v => v.lang.startsWith('en'));
          if (availableVoices.length === 0) {
            availableVoices = synth.getVoices();
          }
          if (!selectedVoice && availableVoices.length) {
            selectedVoice = availableVoices.find(v => v.lang === 'en-IN') || availableVoices[0];
          }
          resolve(availableVoices);
        };
        if (synth.getVoices().length) load();
        else synth.addEventListener('voiceschanged', load);
      });
    };

    // Process queue
    const processQueue = () => {
      if (speechQueue.length === 0 || isSpeaking) return;
      const { text, style, onEnd } = speechQueue.shift();
      isSpeaking = true;
      speakText(text, style, () => {
        isSpeaking = false;
        if (onEnd) onEnd();
        processQueue();
      });
    };

    // Speak a full text with style, splitting into sentences
    const speakText = (text, style, callback) => {
      if (!window.speechSynthesis) {
        if (callback) callback();
        return;
      }
      // Split into sentences (split by . but keep the period)
      const sentences = text.match(/[^.!?]+[.!?]/g) || [text];
      if (sentences.length === 0) {
        if (callback) callback();
        return;
      }

      let styleParams = {
        normal: { baseRate: 0.9, basePitch: 0.95, gap: 120 },
        excited: { baseRate: 1.05, basePitch: 1.1, gap: 80 },
        dramatic: { baseRate: 1.1, basePitch: 1.15, gap: 150 }
      }[style] || styleParams.normal;

      let index = 0;
      const speakNext = () => {
        if (index >= sentences.length) {
          if (callback) callback();
          return;
        }
        const sentence = sentences[index].trim();
        if (!sentence) {
          index++;
          speakNext();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(sentence);
        if (selectedVoice) utterance.voice = selectedVoice;
        // Apply random pitch variation ±2%
        const randomFactor = 1 + (Math.random() - 0.5) * 0.04;
        utterance.rate = styleParams.baseRate;
        utterance.pitch = styleParams.basePitch * randomFactor;
        utterance.volume = 1;
        utterance.onend = () => {
          index++;
          // Add natural gap between sentences
          if (index < sentences.length) {
            setTimeout(speakNext, styleParams.gap);
          } else {
            if (callback) callback();
          }
        };
        utterance.onerror = () => {
          index++;
          if (index < sentences.length) {
            setTimeout(speakNext, styleParams.gap);
          } else {
            if (callback) callback();
          }
        };
        window.speechSynthesis.speak(utterance);
      };
      speakNext();
    };

    const speakWithCallback = (text, style, onEnd) => {
      if (!text) {
        if (onEnd) onEnd();
        return;
      }
      speechQueue.push({ text, style, onEnd });
      processQueue();
    };

    // Clear speech queue and cancel current utterance
    const clearSpeechQueue = () => {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      speechQueue.length = 0;
      isSpeaking = false;
    };

    // --------------------------------------------------------------
    // Audio Context for stadium ambience (unchanged)
    // --------------------------------------------------------------
    let audioCtx = null;
    let murmurSource = null;
    let murmurGain = null;
    let isAmbienceEnabled = true;
    let ambientGainNode = null;

    const initAudio = () => {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      ambientGainNode = audioCtx.createGain();
      ambientGainNode.gain.value = 0.15;
      ambientGainNode.connect(audioCtx.destination);
    };

    const startCrowdMurmur = () => {
      if (!audioCtx) return;
      if (murmurSource) {
        try { murmurSource.stop(); } catch(e) {}
        murmurSource = null;
      }
      const bufferSize = 4096;
      const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
      noiseNode.onaudioprocess = (e) => {
        const output = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.2;
        }
      };
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 500;
      filter.Q.value = 1;
      const murmurGainNode = audioCtx.createGain();
      murmurGainNode.gain.value = 0.1;
      noiseNode.connect(filter);
      filter.connect(murmurGainNode);
      murmurGainNode.connect(ambientGainNode);
      murmurSource = { node: noiseNode, filter, gain: murmurGainNode };
      noiseNode.connect(filter);
    };

    const stopCrowdMurmur = () => {
      if (murmurSource) {
        try { murmurSource.node.disconnect(); } catch(e) {}
        murmurSource = null;
      }
    };

    const playReaction = (type) => {
      if (!audioCtx || !isAmbienceEnabled) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.connect(ambientGainNode);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
      
      if (type === 'cheer') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = 200;
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.5);
        const noise = audioCtx.createBufferSource();
        const bufferSize = 2048;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        noise.buffer = buffer;
        noise.loop = true;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 800;
        filter.Q.value = 5;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.3;
        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(gain);
        osc.connect(gain);
        osc.start();
        noise.start();
        osc.stop(now + 1.2);
        noise.stop(now + 1.2);
        setTimeout(() => {
          try { osc.disconnect(); noise.disconnect(); } catch(e) {}
        }, 1500);
      } else if (type === 'applause') {
        const duration = 1.2;
        const interval = 0.05;
        let time = now;
        for (let i = 0; i < duration / interval; i++) {
          const clickGain = audioCtx.createGain();
          clickGain.connect(gain);
          clickGain.gain.setValueAtTime(0.15, time);
          clickGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = 1500 + Math.random() * 500;
          osc.connect(clickGain);
          osc.start(time);
          osc.stop(time + 0.05);
          time += interval;
        }
      } else if (type === 'gasp') {
        const noise = audioCtx.createBufferSource();
        const bufferSize = 2048;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        noise.buffer = buffer;
        noise.loop = false;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        filter.frequency.exponentialRampToValueAtTime(100, now + 0.8);
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.3;
        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(gain);
        noise.start();
        noise.stop(now + 0.8);
      }
    };

    const setAmbience = (enabled) => {
      isAmbienceEnabled = enabled;
      if (!audioCtx) return;
      if (enabled) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startCrowdMurmur();
      } else {
        stopCrowdMurmur();
      }
    };

    // --------------------------------------------------------------
    // Parser (unchanged)
    // --------------------------------------------------------------
    const parseCricsheetJSON = (json) => {
      if (!json.info || !json.innings || !Array.isArray(json.innings) || json.innings.length < 2) {
        throw new Error("Invalid Cricsheet format: need two innings");
      }
      const matchInfo = {
        teams: (json.info.teams && json.info.teams.join(" vs ")) || "Team A vs Team B",
        team1: json.info.teams ? json.info.teams[0] : "Team A",
        team2: json.info.teams ? json.info.teams[1] : "Team B",
        venue: json.info.venue || "Unknown Venue",
        date: (json.info.dates && json.info.dates[0]) || "Unknown Date",
        winner: (json.info.outcome && json.info.outcome.winner) || "N/A",
        toss: json.info.toss ? `${json.info.toss.winner} won the toss and chose to ${json.info.toss.decision}` : "No toss info",
        maxOvers: json.info.overs || 20
      };
      const inningsData = [];
      for (let innIdx = 0; innIdx < json.innings.length; innIdx++) {
        const inn = json.innings[innIdx];
        const team = inn.team;
        const deliveriesFlat = [];
        const battingStats = {};
        const bowlingStats = {};

        for (var i = 0; i < inn.overs.length; i++) {
          var overObj = inn.overs[i];
          var overNum = overObj.over;
          for (var j = 0; j < overObj.deliveries.length; j++) {
            var delivery = overObj.deliveries[j];
            var runs = (delivery.runs && delivery.runs.total) || 0;
            var isWicket = !!(delivery.wickets && delivery.wickets.length);
            var wicketKind = null;
            var wicketPlayer = null;
            var extras = (delivery.runs && delivery.runs.extras) || 0;
            var extrasObj = {};
            if (delivery.extras) {
              if (delivery.extras.wides) extrasObj.wides = delivery.extras.wides;
              if (delivery.extras.byes) extrasObj.byes = delivery.extras.byes;
              if (delivery.extras.legbyes) extrasObj.legbyes = delivery.extras.legbyes;
            }
            if (isWicket) {
              var w = delivery.wickets[0];
              wicketKind = w.kind;
              wicketPlayer = w.player_out;
            }

            // Batting stats
            const striker = delivery.batter;
            if (!battingStats[striker]) {
              battingStats[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            }
            if (!extrasObj.wides && !extrasObj.noballs) {
              battingStats[striker].balls++;
            }
            battingStats[striker].runs += runs;
            if (runs === 4) battingStats[striker].fours++;
            if (runs === 6) battingStats[striker].sixes++;

            // Bowling stats
            const bowler = delivery.bowler;
            if (!bowlingStats[bowler]) {
              bowlingStats[bowler] = { overs: 0, runs: 0, wickets: 0, legalBalls: 0 };
            }
            if (!extrasObj.wides) {
              bowlingStats[bowler].legalBalls++;
            }
            bowlingStats[bowler].runs += runs;
            if (isWicket) {
              bowlingStats[bowler].wickets++;
            }

            deliveriesFlat.push({
              over: overNum,
              ball: delivery.ball || ((deliveriesFlat.length % 6) + 1),
              runs: runs,
              wicket: isWicket,
              wicketKind: wicketKind,
              wicketPlayer: wicketPlayer,
              extras: extras,
              extrasObj: extrasObj,
              striker: striker,
              nonStriker: delivery.non_striker,
              bowler: bowler
            });
          }
        }

        for (let bowler in bowlingStats) {
          let balls = bowlingStats[bowler].legalBalls;
          let overs = Math.floor(balls / 6) + (balls % 6) / 10;
          bowlingStats[bowler].overs = overs.toFixed(1);
          delete bowlingStats[bowler].legalBalls;
        }

        inningsData.push({ team, deliveries: deliveriesFlat, battingStats, bowlingStats });
      }
      let target = null;
      if (inningsData.length === 2) {
        const firstInningsScore = inningsData[0].deliveries.reduce((sum, d) => sum + d.runs, 0);
        target = firstInningsScore + 1;
      }
      return { matchInfo, inningsData, target };
    };

    const computeStateUpTo = function(deliveries, maxIndex) {
      var totalRuns = 0, wickets = 0, legalBalls = 0;
      for (var i = 0; i <= maxIndex; i++) {
        var d = deliveries[i];
        totalRuns += d.runs;
        if (d.wicket) wickets++;
        if (!d.extrasObj.wides) legalBalls++;
      }
      var oversDecimal = Math.floor(legalBalls / 6) + (legalBalls % 6) / 10;
      return { totalRuns, wickets, legalBalls, overs: oversDecimal.toFixed(1) };
    };

    const computeCumulativeStats = (deliveries, maxIndex) => {
      const battingStats = {};
      const bowlingStats = {};
      for (var i = 0; i <= maxIndex; i++) {
        const d = deliveries[i];
        const striker = d.striker;
        const bowler = d.bowler;
        const runs = d.runs;
        const isWicket = d.wicket;
        const extrasObj = d.extrasObj;

        if (!battingStats[striker]) {
          battingStats[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
        }
        if (!extrasObj.wides && !extrasObj.noballs) {
          battingStats[striker].balls++;
        }
        battingStats[striker].runs += runs;
        if (runs === 4) battingStats[striker].fours++;
        if (runs === 6) battingStats[striker].sixes++;

        if (!bowlingStats[bowler]) {
          bowlingStats[bowler] = { overs: 0, runs: 0, wickets: 0, legalBalls: 0 };
        }
        if (!extrasObj.wides) {
          bowlingStats[bowler].legalBalls++;
        }
        bowlingStats[bowler].runs += runs;
        if (isWicket) {
          bowlingStats[bowler].wickets++;
        }
      }
      for (let bowler in bowlingStats) {
        let balls = bowlingStats[bowler].legalBalls;
        let overs = Math.floor(balls / 6) + (balls % 6) / 10;
        bowlingStats[bowler].overs = overs.toFixed(1);
        delete bowlingStats[bowler].legalBalls;
      }
      return { battingStats, bowlingStats };
    };

    const getTopScorer = (battingStats) => {
      let best = { name: null, runs: -1 };
      for (const [name, stats] of Object.entries(battingStats)) {
        if (stats.runs > best.runs) best = { name, runs: stats.runs, balls: stats.balls, fours: stats.fours, sixes: stats.sixes };
      }
      return best;
    };

    const getBestBowler = (bowlingStats) => {
      let best = { name: null, wickets: -1 };
      for (const [name, stats] of Object.entries(bowlingStats)) {
        if (stats.wickets > best.wickets) best = { name, wickets: stats.wickets, runs: stats.runs, overs: stats.overs };
      }
      return best;
    };

    const App = () => {
      const [matchData, setMatchData] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [fileName, setFileName] = React.useState("");

      const handleFileUpload = (event) => {
        var file = event.target.files[0];
        if (!file) return;
        setFileName(file.name);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var json = JSON.parse(e.target.result);
            var parsed = parseCricsheetJSON(json);
            setMatchData(parsed);
            setError(null);
          } catch (err) {
            setError(err.message);
            setMatchData(null);
          }
        };
        reader.readAsText(file);
      };

      const resetToUpload = function() {
        setMatchData(null);
        setError(null);
        setFileName("");
      };

      if (!matchData) {
        return React.createElement('div', { className: "max-w-2xl mx-auto bg-gray-800/60 backdrop-blur-sm rounded-2xl p-8 border border-gray-700" },
          React.createElement('div', { className: "flex flex-col items-center justify-center gap-6" },
            React.createElement('label', { className: "flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-teal-500/50 rounded-xl cursor-pointer bg-gray-900/40 hover:bg-gray-800/60" },
              React.createElement('div', { className: "flex flex-col items-center justify-center pt-5 pb-6" },
                React.createElement('svg', { className: "w-10 h-10 mb-3 text-teal-400", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                  React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" })
                ),
