<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cricket Live Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; color: #eee; font-family: sans-serif; margin: 20px; }
    #root { padding: 20px; text-align: center; }
    .error-bar { background: #ff4444; color: white; padding: 12px; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; z-index: 1000; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root">Loading application...</div>
  <div id="error-message" style="display: none;"></div>

  <script>
    // Capture errors and show them
    window.onerror = function(msg, url, line, col, error) {
      var errDiv = document.getElementById('error-message');
      errDiv.style.display = 'block';
      errDiv.className = 'error-bar';
      errDiv.innerHTML = '⚠️ JavaScript error: ' + (error ? error.message : msg);
      return true;
    };
    // Check if React loads
    setTimeout(function() {
      if (typeof React === 'undefined') {
        var errDiv = document.getElementById('error-message');
        errDiv.style.display = 'block';
        errDiv.className = 'error-bar';
        errDiv.innerHTML = '⚠️ React failed to load. Check your internet connection or CDN.';
      }
    }, 3000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    // Simple test app – just a welcome message
    const App = () => {
      return React.createElement('div', null, [
        React.createElement('h1', { key: 'title', className: 'text-3xl font-bold text-teal-400' }, '🏏 Cricket Live Studio'),
        React.createElement('p', { key: 'desc' }, 'Upload a Cricsheet JSON file to start the simulation.'),
        React.createElement('input', { key: 'file', type: 'file', accept: '.json', onChange: (e) => alert('File selected: ' + e.target.files[0]?.name) })
      ]);
    };
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
