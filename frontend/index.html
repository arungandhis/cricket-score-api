    const generateRealisticCommentary = (delivery, inningsIdx, target) => {

        caught: "Caught! The fielder makes no mistake!",
        bowled: "Bowled him! Timber!",
        lbw: "Plumb in front! That's out!",
        "run out": "Run out! Direct hit!",
        stumped: "Stumped! The keeper whips the bails off!"

      if (isWicket) {
        var phrase = wicketPhrases[wicketKind] || "Wicket! The batsman has to go!";

      }
      if (extras > 0) {

        var dotPhrases = ["Dot ball! Good bowling.", "No run. Excellent fielding.", "Beaten! That's a beauty."];
        return dotPhrases[Math.floor(Math.random() * 3)];
      }

      if (runs === 2) return "Two runs. Good running between the wickets.";

        var p = boundary[Math.floor(Math.random() * boundary.length)];

        return p2;
      }
      return runs + " runs taken.";
    };

    async function fetchPlayerImageFromWikipedia(playerName) {
      if (!playerName) return null;
      if (playerImageCache.has(playerName)) return playerImageCache.get(playerName);

      async function tryFetchImage(pageTitle) {
        try {
          const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`;
          const res = await fetch(summaryUrl);
          if (res.ok) {
            const data = await res.json();
            if (data.thumbnail && data.thumbnail.source) return data.thumbnail.source;
          }
        } catch (e) {}
        try {
          const actionUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&origin=*&titles=${encodeURIComponent(pageTitle)}&pithumbsize=200`;
          const res = await fetch(actionUrl);
          if (res.ok) {
            const data = await res.json();
            const pages = data.query && data.query.pages;
            if (pages) {
              const firstPage = Object.values(pages)[0];
              if (firstPage && firstPage.thumbnail && firstPage.thumbnail.source) return firstPage.thumbnail.source;
            }
          }
        } catch (e) {}
        return null;
      }

      let cleanName = playerName.replace(/\s*\([^)]*\)/g, '').trim();
      let imgUrl = await tryFetchImage(cleanName);
      if (!imgUrl && cleanName.includes(' ')) {
        const parts = cleanName.split(' ');
        if (parts.length >= 2 && parts[0].length <= 3 && parts[0].includes('.')) {
          const withoutInitial = parts.slice(1).join(' ');
          imgUrl = await tryFetchImage(withoutInitial);
        }
      }
      if (!imgUrl && !cleanName.toLowerCase().includes('cricketer')) {
        imgUrl = await tryFetchImage(cleanName + ' (cricketer)');
      }
      if (imgUrl) {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        return new Promise((resolve) => {
          img.onload = () => { playerImageCache.set(playerName, img); resolve(img); };
          img.onerror = () => { playerImageCache.set(playerName, null); resolve(null); };
          img.src = imgUrl;
        });
      } else {
        playerImageCache.set(playerName, null);
        return null;
      }
    }

    async function loadTeamPlayers(teamName, playerNames) {
      if (teamPlayersCache.has(teamName)) return teamPlayersCache.get(teamName);
      const playingXI = playerNames.slice(0, 11);
      var players = [];
      for (var i = 0; i < playingXI.length; i++) {
        var name = playingXI[i];
        var img = await fetchPlayerImageFromWikipedia(name);
        players.push({ name: getLastName(name), fullName: name, image: img });
      }
      teamPlayersCache.set(teamName, players);
      return players;
    }

    // --------------------------------------------------------------

    var storedElevenlabsKey = localStorage.getItem('elevenlabs_api_key') || '';
    var storedElevenlabsVoice = localStorage.getItem('elevenlabs_voice_id') || '21m00Tcm4TlvDq8ikWAM';

    function speakWithCallback(text, style, onEnd) {

      if (storedPrimaryProvider === 'system') { systemFallback(text, style, onEnd); return; }
      var apiKey, voiceId, region, fallbackProvider, fallbackApiKey, fallbackVoiceId, fallbackRegion;
      if (storedPrimaryProvider === 'elevenlabs') { if (!storedElevenlabsKey) { systemFallback(text, style, onEnd); return; } apiKey = storedElevenlabsKey; voiceId = storedElevenlabsVoice; region = null; if (storedGoogleKey) { fallbackProvider = 'google'; fallbackApiKey = storedGoogleKey; fallbackVoiceId = storedGoogleVoice; } else if (storedAzureKey) { fallbackProvider = 'azure'; fallbackApiKey = storedAzureKey; fallbackVoiceId = storedAzureVoice; fallbackRegion = storedAzureRegion; } else fallbackProvider = null; }
      else if (storedPrimaryProvider === 'google') { if (!storedGoogleKey) { systemFallback(text, style, onEnd); return; } apiKey = storedGoogleKey; voiceId = storedGoogleVoice; region = null; if (storedElevenlabsKey) { fallbackProvider = 'elevenlabs'; fallbackApiKey = storedElevenlabsKey; fallbackVoiceId = storedElevenlabsVoice; } else if (storedAzureKey) { fallbackProvider = 'azure'; fallbackApiKey = storedAzureKey; fallbackVoiceId = storedAzureVoice; fallbackRegion = storedAzureRegion; } else fallbackProvider = null; }
      else if (storedPrimaryProvider === 'azure') { if (!storedAzureKey) { systemFallback(text, style, onEnd); return; } apiKey = storedAzureKey; voiceId = storedAzureVoice; region = storedAzureRegion; if (storedElevenlabsKey) { fallbackProvider = 'elevenlabs'; fallbackApiKey = storedElevenlabsKey; fallbackVoiceId = storedElevenlabsVoice; } else if (storedGoogleKey) { fallbackProvider = 'google'; fallbackApiKey = storedGoogleKey; fallbackVoiceId = storedGoogleVoice; } else fallbackProvider = null; }
      else { systemFallback(text, style, onEnd); return; }
      fetch(BACKEND_URL + '/speak', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text: text, style: style, provider: storedPrimaryProvider, apiKey: apiKey, voiceId: voiceId, region: region, fallbackProvider: fallbackProvider, fallbackApiKey: fallbackApiKey, fallbackVoiceId: fallbackVoiceId, fallbackRegion: fallbackRegion }) })
        .then(function(res) { return res.blob(); }).then(function(blob) { var url = URL.createObjectURL(blob); audioQueue.push({ url: url, onEnd: onEnd }); processAudioQueue(); })
        .catch(function(err) { console.error(err); systemFallback(text, style, onEnd); });
    }
    function processAudioQueue() { if (audioQueue.length === 0 || isAudioPlaying) return; var item = audioQueue.shift(); playAudio(item.url, item.onEnd); }
    function playAudio(url, onEnd) { if (audioPlayer) { audioPlayer.pause(); audioPlayer.src = ''; } audioPlayer = new Audio(url); audioPlayer.onended = function() { isAudioPlaying = false; if (onEnd) onEnd(); processAudioQueue(); }; audioPlayer.onerror = function() { isAudioPlaying = false; if (onEnd) onEnd(); processAudioQueue(); }; audioPlayer.play(); isAudioPlaying = true; }

    var audioCtx = null, masterGain = null, eqChain = [], isAmbienceEnabled = true, murmurStarted = false;
    function initAudio() { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.gain.value = 1; masterGain.connect(audioCtx.destination); var hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 80; var cut = audioCtx.createBiquadFilter(); cut.type = 'peaking'; cut.frequency.value = 250; cut.gain.value = -3; cut.Q.value = 1; var boost = audioCtx.createBiquadFilter(); boost.type = 'peaking'; boost.frequency.value = 4000; boost.gain.value = 4; boost.Q.value = 1; var hs = audioCtx.createBiquadFilter(); hs.type = 'highshelf'; hs.frequency.value = 10000; hs.gain.value = 2; eqChain = [hp, cut, boost, hs]; for (var i = 0; i < eqChain.length - 1; i++) eqChain[i].connect(eqChain[i+1]); eqChain[eqChain.length-1].connect(masterGain); if (!recordingDestinationNode) recordingDestinationNode = audioCtx.createMediaStreamDestination(); eqChain[eqChain.length-1].connect(recordingDestinationNode); }
    function startCrowdMurmur() { if (!audioCtx || murmurStarted) return; murmurStarted = true; var bufferSize = 4096; var noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1); noiseNode.onaudioprocess = function(e) { var out = e.outputBuffer.getChannelData(0); for (var i = 0; i < bufferSize; i++) out[i] = (Math.random() * 2 - 1) * 0.15; }; var filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 1; var gain = audioCtx.createGain(); gain.gain.value = 0.045; noiseNode.connect(filter); filter.connect(gain); gain.connect(eqChain[0]); }
    function stopCrowdMurmur() { murmurStarted = false; }
    function setAmbience(enabled) { isAmbienceEnabled = enabled; if (!audioCtx) return; if (enabled) { if (audioCtx.state === 'suspended') audioCtx.resume(); startCrowdMurmur(); } else stopCrowdMurmur(); }
    function playReaction(type) { if (!audioCtx || !isAmbienceEnabled) return; if (audioCtx.state === 'suspended') audioCtx.resume(); var now = audioCtx.currentTime; var gain = audioCtx.createGain(); gain.connect(eqChain[0]); var target = type === 'cheer' ? 0.35 : (type === 'applause' ? 0.2 : 0.1); var dur = type === 'cheer' ? 1.5 : (type === 'applause' ? 1.2 : 0.8); gain.gain.setValueAtTime(target, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + dur); if (type === 'cheer') { var osc = audioCtx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 200; osc.frequency.exponentialRampToValueAtTime(600, now + 0.5); osc.connect(gain); osc.start(); osc.stop(now + 1.2); } else if (type === 'applause') { var interval = 0.05; var t = now; for (var i = 0; i < 1.2 / interval; i++) { var cg = audioCtx.createGain(); cg.connect(gain); cg.gain.setValueAtTime(0.2, t); cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.05); var osc2 = audioCtx.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = 1500 + Math.random() * 500; osc2.connect(cg); osc2.start(t); osc2.stop(t + 0.05); t += interval; } } }

    // --------------------------------------------------------------
    // Match parsing (limit to 11 players per team)
    // --------------------------------------------------------------
    function parseCricsheetJSON(json) {
      if (!json.info || !json.innings || json.innings.length < 2) throw new Error("Invalid Cricsheet: need two innings");
      var tournament = "N/A";
      if (json.info.event && json.info.event.name) tournament = json.info.event.name;
      else if (json.info.competition && json.info.competition.name) tournament = json.info.competition.name;
      var umpires = "N/A";
      if (json.info.officials && json.info.officials.umpires && json.info.officials.umpires.length) umpires = json.info.officials.umpires.join(', ');
      var matchInfo = {
        teams: (json.info.teams && json.info.teams.join(" vs ")) || "Team A vs Team B",
        team1: json.info.teams ? json.info.teams[0] : "Team A",
        team2: json.info.teams ? json.info.teams[1] : "Team B",
        venue: json.info.venue || "Unknown",
        date: (json.info.dates && json.info.dates[0]) || "Unknown",
        winner: (json.info.outcome && json.info.outcome.winner) || "N/A",
        toss: json.info.toss ? json.info.toss.winner + " won toss and chose to " + json.info.toss.decision : "No toss",
        maxOvers: json.info.overs || 20,
        tournament: tournament,
        umpires: umpires
      };
      var inningsData = [];
      var team1PlayerSet = new Set();
      var team2PlayerSet = new Set();

      for (var innIdx = 0; innIdx < json.innings.length; innIdx++) {
        var inn = json.innings[innIdx];
        var team = inn.team;
        var deliveries = [];
        var batting = {};
        var bowling = {};

        for (var o = 0; o < inn.overs.length; o++) {
          var overObj = inn.overs[o];
          var overNum = overObj.over;
          for (var d = 0; d < overObj.deliveries.length; d++) {
            var delivery = overObj.deliveries[d];
            var runs = (delivery.runs && delivery.runs.total) || 0;
            var isWicket = !!(delivery.wickets && delivery.wickets.length);
            var wicketKind = null, wicketPlayer = null, wicketFielder = null;
            var extras = (delivery.runs && delivery.runs.extras) || 0;
            var extrasObj = {};
            if (delivery.extras) {
              if (delivery.extras.wides) extrasObj.wides = delivery.extras.wides;
              if (delivery.extras.byes) extrasObj.byes = delivery.extras.byes;
              if (delivery.extras.legbyes) extrasObj.legbyes = delivery.extras.legbyes;
            }
            if (isWicket) {
              var w = delivery.wickets[0];
              wicketKind = w.kind;
              wicketPlayer = w.player_out;
              wicketFielder = w.fielder;
            }
            var striker = delivery.batter;
            if (!batting[striker]) batting[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            if (!extrasObj.wides) batting[striker].balls++;
            batting[striker].runs += runs;
            if (runs === 4) batting[striker].fours++;
            if (runs === 6) batting[striker].sixes++;
            var bowler = delivery.bowler;
            if (!bowling[bowler]) bowling[bowler] = { overs: 0, runs: 0, wickets: 0, legalBalls: 0 };
            if (!extrasObj.wides) bowling[bowler].legalBalls++;
            bowling[bowler].runs += runs;
            if (isWicket) bowling[bowler].wickets++;
            deliveries.push({
              over: overNum,
              ball: delivery.ball || ((deliveries.length % 6) + 1),
              runs: runs,
              wicket: isWicket,
              wicketKind: wicketKind,
              wicketPlayer: wicketPlayer,
              wicketFielder: wicketFielder,
              extras: extras,
              extrasObj: extrasObj,
              striker: striker,
              nonStriker: delivery.non_striker,
              bowler: bowler
            });

            if (team === matchInfo.team1) {
              team1PlayerSet.add(striker);
              team1PlayerSet.add(bowler);
              if (delivery.non_striker) team1PlayerSet.add(delivery.non_striker);
              if (wicketPlayer) team1PlayerSet.add(wicketPlayer);
              if (wicketFielder) team1PlayerSet.add(wicketFielder);
            } else if (team === matchInfo.team2) {
              team2PlayerSet.add(striker);
              team2PlayerSet.add(bowler);
              if (delivery.non_striker) team2PlayerSet.add(delivery.non_striker);
              if (wicketPlayer) team2PlayerSet.add(wicketPlayer);
              if (wicketFielder) team2PlayerSet.add(wicketFielder);

      var target = null;
      if (inningsData.length === 2) {
        var firstTotal = 0;
