<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cricket Broadcast Pro – Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .commentary-text { font-family: 'JetBrains Mono', monospace; }
    canvas { box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border-radius: 1rem; background: #0a1f1e; width: 100%; height: auto; }
    .error-bar { background: #ff4444; color: white; padding: 12px; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; z-index: 1000; font-size: 14px; z-index: 1001; }
    .stats-table { overflow-x: auto; max-width: 100%; }
    .stats-table table { min-width: 500px; }
    .result-banner { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    select, input { background: #1f2937; color: white; border-radius: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    .settings-panel { background: #1f2937; border-radius: 0.75rem; padding: 0.75rem; margin-top: 0.5rem; }
    .settings-panel input, .settings-panel select { background: #374151; border: none; border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    .settings-panel button { background: #2dd4bf; color: #111; font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 0.375rem; }
    .warning { background: #facc15; color: #1f2937; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; margin-top: 6px; }
    #root { min-height: 100vh; }
    .loading { padding: 20px; text-align: center; color: #9ca3af; }
  </style>
  <!-- Polyfills for async/await on older browsers -->
  <script src="https://unpkg.com/regenerator-runtime@0.13.11/runtime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-gray-100">
  <div id="root">Loading application...</div>
  <div id="error-message" style="display: none;"></div>

  <!-- Global error handler to catch any script errors -->
  <script>
    window.addEventListener('error', function(event) {
      var errDiv = document.getElementById('error-message');
      if (errDiv) {
        errDiv.style.display = 'block';
        errDiv.className = 'error-bar';
        errDiv.innerHTML = '⚠️ JavaScript error: ' + (event.message || 'Unknown error');
      }
    });
  </script>

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel" data-presets="es2015,react,stage-2">
    // --------------------------------------------------------------
    // Helper: get last name
    // --------------------------------------------------------------
    const getLastName = (fullName) => {
      if (!fullName) return "player";
      var parts = fullName.split(/[\s.]+/);
      var lastName = parts[parts.length - 1];
      return lastName || fullName;
    };

    // --------------------------------------------------------------
    // Realistic commentary generator
    // --------------------------------------------------------------
    const generateRealisticCommentary = (delivery, inningsIdx, target) => {
      var runs = delivery.runs;
      var isWicket = delivery.wicket;
      var wicketKind = delivery.wicketKind;
      var striker = delivery.striker;
      var bowler = delivery.bowler;
      var extras = delivery.extras || 0;

      var boundaryPhrases = [
        "Cracked away to the boundary!",
        "That's a glorious shot!",
        "Pure timing!",
        "Races away to the rope!",
        "He's dispatched that one!"
      ];
      var sixPhrases = [
        "High and handsome! Six runs!",
        "Out of the park! What a hit!",
        "That's massive!",
        "Into the crowd!",
        "He's launched it!"
      ];
      var wicketPhrases = {
        caught: "Caught! The fielder makes no mistake!",
        bowled: "Bowled him! Timber!",
        lbw: "Plumb in front! That's out!",
        "run out": "Run out! Direct hit!",
        stumped: "Stumped! The keeper whips the bails off!"
      };

      if (isWicket) {
        var phrase = wicketPhrases[wicketKind] || "Wicket! The batsman has to go!";
        return getLastName(striker) + " is out! " + phrase;
      }
      if (extras > 0) {
        if (delivery.extrasObj && delivery.extrasObj.wides) return "Wide! " + extras + " run added. " + getLastName(bowler) + " needs to get his line right.";
        if (delivery.extrasObj && delivery.extrasObj.byes) return "Byes! " + extras + " runs. The keeper missed it.";
        if (delivery.extrasObj && delivery.extrasObj.legbyes) return "Leg‑byes! " + extras + " runs.";
        return extras + " extras.";
      }
      if (runs === 0) {
        var dotPhrases = ["Dot ball! Good bowling.", "No run. Excellent fielding.", "Beaten! That's a beauty."];
        return dotPhrases[Math.floor(Math.random() * dotPhrases.length)];
      }
      if (runs === 1) return "Quick single! They scamper through.";
      if (runs === 2) return "Two runs. Good running between the wickets.";
      if (runs === 4) {
        var phrase = boundaryPhrases[Math.floor(Math.random() * boundaryPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 4)) phrase += " The scores are level!";
        return phrase;
      }
      if (runs === 6) {
        var phrase = sixPhrases[Math.floor(Math.random() * sixPhrases.length)];
        if (inningsIdx === 1 && target && (target - (delivery.currentScore || 0) <= 6)) phrase += " Just one big hit away!";
        return phrase;
      }
      return runs + " runs taken.";
    };

    // --------------------------------------------------------------
    // Backend URL (must be your multi‑provider backend)
    // --------------------------------------------------------------
    const BACKEND_URL = 'https://cricket-score-api-57pk.onrender.com'; // Update if needed

    // --------------------------------------------------------------
    // TTS audio queue (for backend audio) with recording support
    // --------------------------------------------------------------
    let audioPlayer = null;
    let audioQueue = [];
    let isAudioPlaying = false;
    let recordingDestination = null;
    let audioElementsConnected = new Set();

    function playAudio(url, onEnd) {
      if (audioPlayer) {
        audioPlayer.pause();
        audioPlayer.src = '';
        if (audioPlayer.sourceNode) {
          try { audioPlayer.sourceNode.disconnect(); } catch(e) {}
          audioPlayer.sourceNode = null;
        }
      }
      audioPlayer = new Audio(url);
      if (recordingDestination && audioCtx) {
        try {
          const source = audioCtx.createMediaElementSource(audioPlayer);
          source.connect(recordingDestination);
          source.connect(eqChain[0]);
          audioPlayer.sourceNode = source;
        } catch(e) {
          console.warn('Could not connect audio to recording destination', e);
        }
      }
      audioPlayer.onended = () => {
        isAudioPlaying = false;
        if (onEnd) onEnd();
        processAudioQueue();
      };
      audioPlayer.onerror = () => {
        isAudioPlaying = false;
        if (onEnd) onEnd();
        processAudioQueue();
      };
      audioPlayer.play();
      isAudioPlaying = true;
    }

    function processAudioQueue() {
      if (audioQueue.length === 0 || isAudioPlaying) return;
      const { url, onEnd } = audioQueue.shift();
      playAudio(url, onEnd);
    }

    function clearAudioQueue() {
      if (audioPlayer) {
        audioPlayer.pause();
        audioPlayer.src = '';
        if (audioPlayer.sourceNode) {
          try { audioPlayer.sourceNode.disconnect(); } catch(e) {}
          audioPlayer.sourceNode = null;
        }
      }
      audioQueue = [];
      isAudioPlaying = false;
    }

    // --------------------------------------------------------------
    // System voice fallback (browser TTS) – not captured in recording
    // --------------------------------------------------------------
    let systemSpeechQueue = [];
    let isSystemSpeaking = false;
    let selectedSystemVoice = null;
    let availableSystemVoices = [];

    function loadSystemVoices() {
      return new Promise((resolve) => {
        if (window.speechSynthesis) {
          const load = () => {
            availableSystemVoices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (availableSystemVoices.length === 0) availableSystemVoices = window.speechSynthesis.getVoices();
            if (!selectedSystemVoice && availableSystemVoices.length) {
              selectedSystemVoice = availableSystemVoices.find(v => v.lang === 'en-IN') || availableSystemVoices[0];
            }
            resolve(availableSystemVoices);
          };
          if (window.speechSynthesis.getVoices().length) load();
          else window.speechSynthesis.addEventListener('voiceschanged', load);
        } else {
          resolve([]);
        }
      });
    }

    function systemFallback(text, style, onEnd) {
      systemSpeechQueue.push({ text, style, onEnd });
      processSystemSpeech();
    }

    function processSystemSpeech() {
      if (isSystemSpeaking) return;
      if (systemSpeechQueue.length === 0) return;
      const { text, style, onEnd } = systemSpeechQueue.shift();
      isSystemSpeaking = true;

      const sentences = text.match(/[^.!?]+[.!?]/g) || [text];
      if (sentences.length === 0) {
        isSystemSpeaking = false;
        if (onEnd) onEnd();
        processSystemSpeech();
        return;
      }

      let styleParams = {
        normal: { rate: 0.9, pitch: 0.95, gap: 120 },
        excited: { rate: 1.05, pitch: 1.1, gap: 80 },
        dramatic: { rate: 1.1, pitch: 1.15, gap: 150 }
      }[style] || { rate: 0.9, pitch: 0.95, gap: 120 };

      let index = 0;
      const speakNext = () => {
        if (index >= sentences.length) {
          isSystemSpeaking = false;
          if (onEnd) onEnd();
          processSystemSpeech();
          return;
        }
        const sentence = sentences[index].trim();
        if (!sentence) {
          index++;
          speakNext();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(sentence);
        if (selectedSystemVoice) utterance.voice = selectedSystemVoice;
        utterance.rate = styleParams.rate;
        utterance.pitch = styleParams.pitch;
        utterance.onend = () => {
          index++;
          if (index < sentences.length) {
            setTimeout(speakNext, styleParams.gap);
          } else {
            isSystemSpeaking = false;
            if (onEnd) onEnd();
            processSystemSpeech();
          }
        };
        utterance.onerror = () => {
          index++;
          if (index < sentences.length) {
            setTimeout(speakNext, styleParams.gap);
          } else {
            isSystemSpeaking = false;
            if (onEnd) onEnd();
            processSystemSpeech();
          }
        };
        window.speechSynthesis.speak(utterance);
      };
      speakNext();
    }

    function clearAllSpeech() {
      clearAudioQueue();
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      systemSpeechQueue = [];
      isSystemSpeaking = false;
    }

    // --------------------------------------------------------------
    // Multi‑provider TTS dispatcher
    // --------------------------------------------------------------
    let storedPrimaryProvider = localStorage.getItem('primary_provider') || 'system';
    let storedElevenlabsKey = localStorage.getItem('elevenlabs_api_key') || '';
    let storedElevenlabsVoice = localStorage.getItem('elevenlabs_voice_id') || '21m00Tcm4TlvDq8ikWAM';
    let storedGoogleKey = localStorage.getItem('google_api_key') || '';
    let storedGoogleVoice = localStorage.getItem('google_voice_id') || 'en-GB-Wavenet-A';

    function updateTtsSettings(primary, elevenlabsKey, elevenlabsVoice, googleKey, googleVoice) {
      storedPrimaryProvider = primary;
      storedElevenlabsKey = elevenlabsKey;
      storedElevenlabsVoice = elevenlabsVoice;
      storedGoogleKey = googleKey;
      storedGoogleVoice = googleVoice;
      localStorage.setItem('primary_provider', primary);
      localStorage.setItem('elevenlabs_api_key', elevenlabsKey);
      localStorage.setItem('elevenlabs_voice_id', elevenlabsVoice);
      localStorage.setItem('google_api_key', googleKey);
      localStorage.setItem('google_voice_id', googleVoice);
    }

    function speakWithCallback(text, style, onEnd) {
      if (!text) {
        if (onEnd) onEnd();
        return;
      }

      if (storedPrimaryProvider === 'system') {
        systemFallback(text, style, onEnd);
        return;
      }

      let apiKey, voiceId, fallbackProvider, fallbackApiKey, fallbackVoiceId;
      if (storedPrimaryProvider === 'elevenlabs') {
        if (!storedElevenlabsKey) {
          systemFallback(text, style, onEnd);
          return;
        }
        apiKey = storedElevenlabsKey;
        voiceId = storedElevenlabsVoice;
        if (storedGoogleKey) {
          fallbackProvider = 'google';
          fallbackApiKey = storedGoogleKey;
          fallbackVoiceId = storedGoogleVoice;
        } else {
          fallbackProvider = null;
        }
      } else if (storedPrimaryProvider === 'google') {
        if (!storedGoogleKey) {
          systemFallback(text, style, onEnd);
          return;
        }
        apiKey = storedGoogleKey;
        voiceId = storedGoogleVoice;
        if (storedElevenlabsKey) {
          fallbackProvider = 'elevenlabs';
          fallbackApiKey = storedElevenlabsKey;
          fallbackVoiceId = storedElevenlabsVoice;
        } else {
          fallbackProvider = null;
        }
      } else {
        systemFallback(text, style, onEnd);
        return;
      }

      fetch(`${BACKEND_URL}/speak`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          style,
          provider: storedPrimaryProvider,
          apiKey,
          voiceId,
          fallbackProvider,
          fallbackApiKey,
          fallbackVoiceId
        })
      })
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.blob();
      })
      .then(blob => {
        const url = URL.createObjectURL(blob);
        audioQueue.push({ url, onEnd });
        processAudioQueue();
      })
      .catch(err => {
        console.error('External TTS failed:', err);
        systemFallback(text, style, onEnd);
      });
    }

    // --------------------------------------------------------------
    // Audio Context for stadium ambience with recording support
    // --------------------------------------------------------------
    let audioCtx = null;
    let masterGain = null;
    let eqChain = [];
    let isAmbienceEnabled = true;
    let murmurStarted = false;
    let murmurSource = null;
    let lastReactionTime = 0;
    let recordingDestinationNode = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1;
      masterGain.connect(audioCtx.destination);
      
      const highpass = audioCtx.createBiquadFilter();
      highpass.type = 'highpass';
      highpass.frequency.value = 80;
      const cut = audioCtx.createBiquadFilter();
      cut.type = 'peaking';
      cut.frequency.value = 250;
      cut.gain.value = -3;
      cut.Q.value = 1;
      const boost = audioCtx.createBiquadFilter();
      boost.type = 'peaking';
      boost.frequency.value = 4000;
      boost.gain.value = 4;
      boost.Q.value = 1;
      const highShelf = audioCtx.createBiquadFilter();
      highShelf.type = 'highshelf';
      highShelf.frequency.value = 10000;
      highShelf.gain.value = 2;
      
      eqChain = [highpass, cut, boost, highShelf];
      for (let i = 0; i < eqChain.length - 1; i++) {
        eqChain[i].connect(eqChain[i+1]);
      }
      eqChain[eqChain.length-1].connect(masterGain);
      
      if (!recordingDestinationNode) {
        recordingDestinationNode = audioCtx.createMediaStreamDestination();
      }
      eqChain[eqChain.length-1].connect(recordingDestinationNode);
    }

    function startCrowdMurmur() {
      if (!audioCtx || murmurStarted) return;
      murmurStarted = true;
      const bufferSize = 4096;
      const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
      noiseNode.onaudioprocess = function(e) {
        const output = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.15;
        }
      };
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      filter.Q.value = 1;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.045;
      noiseNode.connect(filter);
      filter.connect(gain);
      gain.connect(eqChain[0]);
      murmurSource = noiseNode;
    }

    function stopCrowdMurmur() {
      if (murmurSource) {
        try { murmurSource.disconnect(); } catch(e) {}
        murmurSource = null;
      }
      murmurStarted = false;
    }

    function setAmbience(enabled) {
      isAmbienceEnabled = enabled;
      if (!audioCtx) return;
      if (enabled) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startCrowdMurmur();
      } else {
        stopCrowdMurmur();
      }
    }

    function playReaction(type) {
      if (!audioCtx || !isAmbienceEnabled) return;
      const now = Date.now();
      if (now - lastReactionTime < 500) return;
      lastReactionTime = now;
      
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const currentTime = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.connect(eqChain[0]);
      
      let targetGain = 0;
      let pan = 0;
      let duration = 1.2;
      if (type === 'cheer') {
        targetGain = 0.35;
        pan = 0.2;
        duration = 1.5;
      } else if (type === 'applause') {
        targetGain = 0.2;
        pan = -0.1;
        duration = 1.2;
      } else if (type === 'gasp') {
        targetGain = 0.1;
        pan = 0;
        duration = 0.8;
      }
      gain.gain.setValueAtTime(targetGain, currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, currentTime + duration);
      
      const panner = audioCtx.createStereoPanner();
      panner.pan.value = pan;
      gain.connect(panner);
      panner.connect(eqChain[0]);
      
      if (type === 'cheer') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = 200;
        osc.frequency.exponentialRampToValueAtTime(600, currentTime + 0.5);
        const noise = audioCtx.createBufferSource();
        const bufferSize = 2048;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        noise.loop = true;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 800;
        filter.Q.value = 5;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.6;
        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(gain);
        osc.connect(gain);
        osc.start();
        noise.start();
        osc.stop(currentTime + 1.2);
        noise.stop(currentTime + 1.2);
      } else if (type === 'applause') {
        const duration2 = 1.2;
        const interval = 0.05;
        let time = currentTime;
        for (let i = 0; i < duration2 / interval; i++) {
          const clickGain = audioCtx.createGain();
          clickGain.connect(gain);
          clickGain.gain.setValueAtTime(0.2, time);
          clickGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = 1500 + Math.random() * 500;
          osc.connect(clickGain);
          osc.start(time);
          osc.stop(time + 0.05);
          time += interval;
        }
      } else if (type === 'gasp') {
        const noise = audioCtx.createBufferSource();
        const bufferSize = 2048;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        noise.loop = false;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        filter.frequency.exponentialRampToValueAtTime(100, currentTime + 0.8);
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.4;
        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(gain);
        noise.start();
        noise.stop(currentTime + 0.8);
      }
    }

    // --------------------------------------------------------------
    // Match parsing and simulation
    // --------------------------------------------------------------
    function parseCricsheetJSON(json) {
      if (!json.info || !json.innings || !Array.isArray(json.innings) || json.innings.length < 2) {
        throw new Error("Invalid Cricsheet format: need two innings");
      }
      // Safe property access (no optional chaining)
      var tournament = "N/A";
      if (json.info.event && json.info.event.name) tournament = json.info.event.name;
      else if (json.info.competition && json.info.competition.name) tournament = json.info.competition.name;
      
      var umpires = "N/A";
      if (json.info.officials && json.info.officials.umpires && json.info.officials.umpires.length) {
        umpires = json.info.officials.umpires.join(', ');
      }
      
      var matchInfo = {
        teams: (json.info.teams && json.info.teams.join(" vs ")) || "Team A vs Team B",
        team1: json.info.teams ? json.info.teams[0] : "Team A",
        team2: json.info.teams ? json.info.teams[1] : "Team B",
        venue: json.info.venue || "Unknown Venue",
        date: (json.info.dates && json.info.dates[0]) || "Unknown Date",
        winner: (json.info.outcome && json.info.outcome.winner) || "N/A",
        toss: json.info.toss ? json.info.toss.winner + " won the toss and chose to " + json.info.toss.decision : "No toss info",
        maxOvers: json.info.overs || 20,
        tournament: tournament,
        umpires: umpires
      };
      var inningsData = [];
      for (var innIdx = 0; innIdx < json.innings.length; innIdx++) {
        var inn = json.innings[innIdx];
        var team = inn.team;
        var deliveriesFlat = [];
        var battingStats = {};
        var bowlingStats = {};

        for (var i = 0; i < inn.overs.length; i++) {
          var overObj = inn.overs[i];
          var overNum = overObj.over;
          for (var j = 0; j < overObj.deliveries.length; j++) {
            var delivery = overObj.deliveries[j];
            var runs = (delivery.runs && delivery.runs.total) || 0;
            var isWicket = !!(delivery.wickets && delivery.wickets.length);
            var wicketKind = null;
            var wicketPlayer = null;
            var extras = (delivery.runs && delivery.runs.extras) || 0;
            var extrasObj = {};
            if (delivery.extras) {
              if (delivery.extras.wides) extrasObj.wides = delivery.extras.wides;
              if (delivery.extras.byes) extrasObj.byes = delivery.extras.byes;
              if (delivery.extras.legbyes) extrasObj.legbyes = delivery.extras.legbyes;
            }
            if (isWicket) {
              var w = delivery.wickets[0];
              wicketKind = w.kind;
              wicketPlayer = w.player_out;
            }

            var striker = delivery.batter;
            if (!battingStats[striker]) battingStats[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            if (!extrasObj.wides && !extrasObj.noballs) battingStats[striker].balls++;
            battingStats[striker].runs += runs;
            if (runs === 4) battingStats[striker].fours++;
            if (runs === 6) battingStats[striker].sixes++;

            var bowler = delivery.bowler;
            if (!bowlingStats[bowler]) bowlingStats[bowler] = { overs: 0, runs: 0, wickets: 0, legalBalls: 0 };
            if (!extrasObj.wides) bowlingStats[bowler].legalBalls++;
            bowlingStats[bowler].runs += runs;
            if (isWicket) bowlingStats[bowler].wickets++;

            deliveriesFlat.push({
              over: overNum,
              ball: delivery.ball || ((deliveriesFlat.length % 6) + 1),
              runs: runs,
              wicket: isWicket,
              wicketKind: wicketKind,
              wicketPlayer: wicketPlayer,
              extras: extras,
              extrasObj: extrasObj,
              striker: striker,
              nonStriker: delivery.non_striker,
              bowler: bowler
            });
          }
        }

        for (var bowler in bowlingStats) {
          var balls = bowlingStats[bowler].legalBalls;
          var overs = Math.floor(balls / 6) + (balls % 6) / 10;
          bowlingStats[bowler].overs = overs.toFixed(1);
          delete bowlingStats[bowler].legalBalls;
        }

        inningsData.push({ team: team, deliveries: deliveriesFlat, battingStats: battingStats, bowlingStats: bowlingStats });
      }
      var target = null;
      if (inningsData.length === 2) {
        var firstInningsScore = inningsData[0].deliveries.reduce(function(sum, d) { return sum + d.runs; }, 0);
        target = firstInningsScore + 1;
      }
      return { matchInfo: matchInfo, inningsData: inningsData, target: target };
    }

    function computeStateUpTo(deliveries, maxIndex) {
      var totalRuns = 0, wickets = 0, legalBalls = 0;
      for (var i = 0; i <= maxIndex; i++) {
        var d = deliveries[i];
        totalRuns += d.runs;
        if (d.wicket) wickets++;
        if (!d.extrasObj.wides) legalBalls++;
      }
      var oversDecimal = Math.floor(legalBalls / 6) + (legalBalls % 6) / 10;
      return { totalRuns: totalRuns, wickets: wickets, legalBalls: legalBalls, overs: oversDecimal.toFixed(1) };
    }

    function computeCumulativeStats(deliveries, maxIndex) {
      var battingStats = {};
      var bowlingStats = {};
      for (var i = 0; i <= maxIndex; i++) {
        var d = deliveries[i];
        var striker = d.striker;
        var bowler = d.bowler;
        var runs = d.runs;
        var isWicket = d.wicket;
        var extrasObj = d.extrasObj;

        if (!battingStats[striker]) battingStats[striker] = { runs: 0, balls: 0, fours: 0, sixes: 0 };
        if (!extrasObj.wides && !extrasObj.noballs) battingStats[striker].balls++;
        battingStats[striker].runs += runs;
        if (runs === 4) battingStats[striker].fours++;
        if (runs === 6) battingStats[striker].sixes++;

        if (!bowlingStats[bowler]) bowlingStats[bowler] = { overs: 0, runs: 0, wickets: 0, legalBalls: 0 };
        if (!extrasObj.wides) bowlingStats[bowler].legalBalls++;
        bowlingStats[bowler].runs += runs;
        if (isWicket) bowlingStats[bowler].wickets++;
      }
      for (var bowler in bowlingStats) {
        var balls = bowlingStats[bowler].legalBalls;
        var overs = Math.floor(balls / 6) + (balls % 6) / 10;
        bowlingStats[bowler].overs = overs.toFixed(1);
        delete bowlingStats[bowler].legalBalls;
      }
      return { battingStats: battingStats, bowlingStats: bowlingStats };
    }

    function getTopScorer(battingStats) {
      var best = { name: null, runs: -1 };
      for (var name in battingStats) {
        if (battingStats[name].runs > best.runs) best = { name: name, runs: battingStats[name].runs, balls: battingStats[name].balls, fours: battingStats[name].fours, sixes: battingStats[name].sixes };
      }
      return best;
    }

    function getBestBowler(bowlingStats) {
      var best = { name: null, wickets: -1 };
      for (var name in bowlingStats) {
        if (bowlingStats[name].wickets > best.wickets) best = { name: name, wickets: bowlingStats[name].wickets, runs: bowlingStats[name].runs, overs: bowlingStats[name].overs };
      }
      return best;
    }

    let playerImageCache = new Map();

    function getPlayerImageUrl(fullName) {
      if (!fullName) return null;
      const nameParts = fullName.split(' ');
      const initials = nameParts.map(p => p.charAt(0).toUpperCase()).join('');
      const backgroundColor = '0D8ABC';
      const textColor = 'FFFFFF';
      return `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=${backgroundColor}&color=${textColor}&size=80&bold=true&length=2`;
    }

    async function loadPlayerImage(fullName) {
      if (!fullName) return null;
      if (playerImageCache.has(fullName)) {
        const cached = playerImageCache.get(fullName);
        if (cached && cached.complete && cached.naturalWidth > 0) return cached;
      }
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
          playerImageCache.set(fullName, img);
          resolve(img);
        };
        img.onerror = () => {
          console.warn(`Failed to load image for ${fullName}`);
          playerImageCache.set(fullName, null);
          resolve(null);
        };
        img.src = getPlayerImageUrl(fullName);
      });
    }

        img.onload = () => {
          stadiumImage = img;
          stadiumImageLoaded = true;
          resolve(true);
        };
        img.onerror = () => {
          console.warn('Could not load stadium background, using fallback.');
          stadiumImageLoaded = false;
          resolve(false);
        };
      });
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error('React error caught:', error, errorInfo);
        var errDiv = document.getElementById('error-message');
        if (errDiv) {
          errDiv.style.display = 'block';
          errDiv.className = 'error-bar';
          errDiv.innerHTML = '⚠️ React Error: ' + (error ? error.message : 'Unknown error');
        }
      }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', { className: "text-center p-8 bg-red-900/50 rounded-lg" },
            React.createElement('h2', { className: "text-xl font-bold text-red-300" }, "Something went wrong"),
            React.createElement('p', { className: "text-sm text-gray-300 mt-2" }, this.state.error ? this.state.error.message : "Please refresh the page."),
            React.createElement('button', { onClick: () => window.location.reload(), className: "mt-4 px-4 py-2 bg-teal-600 rounded" }, "Reload")
          );
        }
        return this.props.children;
      }
    }

    var StatsPanel = function(props) {
      var battingRows = Object.keys(props.battingStats).map(function(name) {
        var s = props.battingStats[name];
        return { name: getLastName(name), runs: s.runs, balls: s.balls, fours: s.fours, sixes: s.sixes, sr: (s.runs / s.balls * 100) || 0 };
      }).sort(function(a,b) { return b.runs - a.runs; });

      var bowlingRows = Object.keys(props.bowlingStats).map(function(name) {

      }).sort(function(a,b) { return a.runs - b.runs; });

      return React.createElement('div', { className: "mt-4 p-3 bg-gray-800/30 rounded-xl" },

                React.createElement('th', { className: "py-1 px-2" }, "O"),

              );

    };

    var App = function() {
      var [matchData, setMatchData] = React.useState(null);
      var [error, setError] = React.useState(null);
      var [fileName, setFileName] = React.useState("");
      var [recentMatches, setRecentMatches] = React.useState([]);
      var [loadingRecent, setLoadingRecent] = React.useState(false);

      var handleFileUpload = function(event) {
        var file = event.target.files[0];
        if (!file) return;
        setFileName(file.name);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var json = JSON.parse(e.target.result);
            var parsed = parseCricsheetJSON(json);
            setMatchData(parsed);
            setError(null);
          } catch (err) {
            setError(err.message);
            setMatchData(null);
          }
        };
        reader.readAsText(file);
      };

      // NEW: Load recent matches via your own backend endpoint
      var loadRecentMatches = async function() {
        setLoadingRecent(true);
        setError(null);
        try {
          const response = await fetch(`${BACKEND_URL}/api/recent-matches`);
          if (!response.ok) throw new Error(`HTTP ${response.status} – ${response.statusText}`);
          const blob = await response.blob();
          const zip = await JSZip.loadAsync(blob);
          const matches = [];
          for (let fileName in zip.files) {
            if (fileName.endsWith('.json')) {
              const content = await zip.files[fileName].async('string');
              try {
                const json = JSON.parse(content);
                const teams = (json.info && json.info.teams) ? json.info.teams.join(' vs ') : 'Unknown match';
                const date = (json.info && json.info.dates && json.info.dates[0]) ? json.info.dates[0] : 'Unknown date';
                const displayName = teams + ' – ' + date;
                matches.push({ fileName, displayName, json });
              } catch(e) {
                console.warn('Could not parse', fileName, e);
              }
            }
          }
          setRecentMatches(matches);
        } catch (err) {
          console.error('Load error:', err);
          setError('Failed to load recent matches: ' + err.message + '. Please try again later or use the manual upload.');
        } finally {
          setLoadingRecent(false);
        }
      };

      var selectRecentMatch = function(e) {
        const idx = e.target.value;
        if (idx === "") return;
        const match = recentMatches[parseInt(idx)];
        if (match) {
          setFileName(match.fileName);
          try {
            const parsed = parseCricsheetJSON(match.json);
            setMatchData(parsed);
            setError(null);
          } catch (err) {
            setError(err.message);
            setMatchData(null);
          }
        }
      };

      var resetToUpload = function() {
        setMatchData(null);
        setError(null);
        setFileName("");
        setRecentMatches([]);
      };

      if (!matchData) {
        return React.createElement('div', { className: "max-w-2xl mx-auto bg-gray-800/60 backdrop-blur-sm rounded-2xl p-8 border border-gray-700" },
          React.createElement('div', { className: "flex flex-col items-center justify-center gap-6" },
            React.createElement('div', { className: "w-full mb-4" },
              React.createElement('button', {
                onClick: loadRecentMatches,
                disabled: loadingRecent,
                className: "w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-2 px-4 rounded-lg mb-4"
              }, loadingRecent ? "Loading matches..." : "Load Recent Men's Matches (last 7 days)"),
              recentMatches.length > 0 && React.createElement('div', null,
                React.createElement('label', { className: "block text-sm font-medium text-gray-300 mb-2" }, "Select a match"),
                React.createElement('select', {
                  className: "w-full bg-gray-700 rounded-lg p-2 text-sm",
                  onChange: selectRecentMatch,
                  defaultValue: ""
                },
                  React.createElement('option', { value: "" }, "-- Choose a match --"),
                  recentMatches.map((match, idx) => React.createElement('option', { key: idx, value: idx }, match.displayName))
                )
              )
            ),
            React.createElement('div', { className: "text-gray-400 text-sm" }, "OR"),
            React.createElement('label', { className: "flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-teal-500/50 rounded-xl cursor-pointer bg-gray-900/40 hover:bg-gray-800/60" },
              React.createElement('div', { className: "flex flex-col items-center justify-center pt-5 pb-6" },
                React.createElement('svg', { className: "w-10 h-10 mb-3 text-teal-400", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                  React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" })
                ),
                React.createElement('p', { className: "mb-2 text-sm text-gray-300" }, React.createElement('span', { className: "font-semibold" }, "Click to upload"), " Cricsheet JSON"),
                React.createElement('p', { className: "text-xs text-gray-400" }, "Full match – both innings working")
              ),
              React.createElement('input', { type: "file", accept: ".json", className: "hidden", onChange: handleFileUpload })
            ),
            error && React.createElement('div', { className: "bg-red-900/50 border border-red-500 rounded-lg p-3 w-full text-red-200 text-sm" }, "⚠️ ", error)
          )
        );
      } else {
        return React.createElement(MatchSimulator, {
          key: fileName,
          matchData: matchData,
          onReset: resetToUpload,
          onFileUpload: handleFileUpload,
          uploadError: error
        });
      }
    };
